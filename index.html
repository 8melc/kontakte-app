<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InTouch">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-arcs.png">
<title>InTouch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2a2a2a;
  --border2: #333333;
  --text: #f0ede8;
  --text2: #888880;
  --text3: #555550;
  --red: #e05a4e;
  --amber: #e0944e;
  --green: #7ec87e;
  --gold: #c8a87e;
  --radius: 12px;
  --radius-sm: 8px;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
input, textarea, button, select { font-family: var(--sans); }

/* App shell */
.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
}
.app-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

/* Header */
.header {
  padding: 52px 20px 14px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header-date {
  font-size: 12px;
  color: var(--text2);
  font-family: var(--mono);
  margin-top: 2px;
}

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner {
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  height: 56px;
  position: relative;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  height: 100%;
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.15s;
}
.nav-tab.active { color: var(--text); }
.nav-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
  margin-bottom: 2px;
}
.nav-tab.active .nav-dot { background: var(--text); }

/* Floating action button */
.fab {
  position: fixed;
  bottom: calc(68px + env(safe-area-inset-bottom));
  right: max(16px, calc((100vw - 430px)/2 + 16px));
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--text);
  color: var(--bg);
  border: none;
  font-size: 24px;
  font-weight: 300;
  cursor: pointer;
  z-index: 51;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* Sections */
.section { padding: 0 20px; margin-bottom: 12px; }
.section-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 16px 0 8px;
}

/* Cards */
.cards { display: flex; flex-direction: column; gap: 1px; }
.card {
  background: var(--surface);
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}
.card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.card:only-child { border-radius: var(--radius); }
.card:active { background: var(--surface2); }
.card.urgent { border-left-color: var(--red); }
.card.soon { border-left-color: var(--amber); }
.card.ok { border-left-color: var(--green); }
.card.neutral { border-left-color: var(--border2); }

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  font-family: var(--mono);
  background: var(--surface2);
  color: var(--text2);
}
.av-inner { background: #2a2418; color: var(--gold); }
.av-close { background: #1e1e2a; color: #8888cc; }
.av-mid { background: #1e2a1e; color: var(--green); }
.av-loose { background: #222220; color: var(--text3); }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 500; }
.card-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--mono);
}
.card-right { text-align: right; flex-shrink: 0; }
.card-days { font-size: 12px; font-family: var(--mono); }
.card-days.urgent { color: var(--red); }
.card-days.soon { color: var(--amber); }
.card-days.ok { color: var(--green); }
.card-days.neutral { color: var(--text3); }
.card-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

.empty-block {
  padding: 20px 16px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  background: var(--surface);
  border-radius: var(--radius);
}

/* Day row in Heute view */
.day-row { margin-bottom: 16px; }
.day-header {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.day-header-date { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.day-today { color: var(--red); }

/* Overdue banner */
.overdue-banner {
  background: var(--surface);
  border: 1px solid #3a2020;
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
}
.overdue-title {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--red);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.overdue-person {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
}
.overdue-person-name { font-size: 14px; font-weight: 500; flex: 1; }
.overdue-person-days { font-size: 12px; font-family: var(--mono); color: var(--red); }

/* Search bar */
.search-bar {
  padding: 8px 20px 4px;
}
.search-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  -webkit-appearance: none;
}
.search-input:focus { outline: none; border-color: var(--border2); }
.search-input::placeholder { color: var(--text3); }

/* Filter row */
.filter-row { display: flex; gap: 6px; padding: 8px 20px 0; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}
.filter-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

/* Relevance section in Personen */
.relevance-section {
  padding: 12px 20px 0;
}
.relevance-question {
  font-size: 15px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 12px;
  line-height: 1.4;
}
.relevance-cards {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.relevance-cards::-webkit-scrollbar { display: none; }
.relevance-card {
  flex-shrink: 0;
  width: 140px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.1s;
}
.relevance-card:active { background: var(--surface2); }
.relevance-card-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--mono);
  margin-bottom: 10px;
}
.relevance-card-name {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.relevance-card-hint {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  line-height: 1.3;
}
.relevance-card-hint.urgent { color: var(--red); }
.relevance-card-hint.soon { color: var(--amber); }

/* Level group in Personen */
.level-group { margin-bottom: 4px; }
.level-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 8px;
  cursor: pointer;
}
.level-group-title {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.level-group-count {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
}
.level-group-chevron {
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.level-group-chevron.collapsed { transform: rotate(-90deg); }
.level-group-cards { display: flex; flex-direction: column; gap: 1px; }
.level-group-cards.collapsed { display: none; }

/* Anlässe timeline */
.anlass-month {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 16px 0 8px;
}
.anlass-card {
  background: var(--surface);
  padding: 13px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
}
.anlass-card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.anlass-card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.anlass-card:only-child { border-radius: var(--radius); }
.anlass-card:active { background: var(--surface2); }
.anlass-date-col {
  flex-shrink: 0;
  width: 44px;
  text-align: center;
}
.anlass-day { font-size: 20px; font-weight: 600; font-family: var(--mono); }
.anlass-weekday { font-size: 10px; font-family: var(--mono); color: var(--text2); text-transform: uppercase; }
.anlass-info { flex: 1; min-width: 0; }
.anlass-title { font-size: 14px; font-weight: 500; }
.anlass-people { font-size: 12px; color: var(--text2); margin-top: 2px; }
.anlass-actions-count { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 3px; }
.anlass-typ {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--mono);
  background: var(--surface2);
  color: var(--text2);
  flex-shrink: 0;
  align-self: center;
}

/* Overlay */
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  z-index: 100;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
}
.overlay.open { display: block; }
.overlay-inner {
  max-width: 430px;
  margin: 0 auto;
  padding: 52px 20px calc(32px + env(safe-area-inset-bottom));
}

/* Back button */
.back-btn {
  background: transparent;
  border: none;
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  padding: 0;
  margin-bottom: 20px;
  font-family: var(--sans);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Form elements */
.form-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  -webkit-appearance: none;
}
.form-input:focus { outline: none; border-color: var(--text3); }
.form-input::placeholder { color: var(--text3); }
.form-input[type="date"] { color-scheme: dark; }
textarea.form-input { resize: vertical; min-height: 80px; font-family: var(--sans); }
select.form-input { color-scheme: dark; }

.level-select { display: flex; gap: 6px; flex-wrap: wrap; }
.level-opt {
  flex: 1;
  min-width: 0;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.level-opt.sel-inner { background: #2a2418; border-color: var(--gold); color: var(--gold); }
.level-opt.sel-close { background: #1e1e2a; border-color: #8888cc; color: #8888cc; }
.level-opt.sel-mid { background: #1e2a1e; border-color: var(--green); color: var(--green); }
.level-opt.sel-loose { background: #222220; border-color: var(--border2); color: var(--text2); }

.form-actions { display: flex; gap: 8px; margin-top: 24px; }
.btn-primary {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--text);
  color: var(--bg);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary:active { opacity: 0.85; }
.btn-secondary {
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 15px;
  cursor: pointer;
}
.btn-danger {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: 1px solid #3a2020;
  background: transparent;
  color: var(--red);
  font-size: 14px;
  cursor: pointer;
  margin-top: 12px;
}

/* Detail view */
.detail-hero { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.detail-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 600; font-family: var(--mono);
}
.detail-name { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.detail-level { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

.info-list {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 16px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--text2); }
.info-val { font-weight: 500; font-family: var(--mono); font-size: 13px; text-align: right; max-width: 60%; }

.action-list { display: flex; flex-direction: column; gap: 1px; margin-bottom: 16px; }
.action-btn {
  width: 100%;
  padding: 14px 16px;
  text-align: left;
  background: var(--surface);
  border: none;
  border-radius: 0;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.action-btn:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.action-btn:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.action-btn:only-child { border-radius: var(--radius); }
.action-btn:active { background: var(--surface2); }
.action-btn.danger { color: var(--red); }
.action-arrow { color: var(--text3); font-family: var(--mono); }

/* Quick entry modal */
.quick-options { display: flex; flex-direction: column; gap: 1px; margin-bottom: 20px; }
.quick-opt {
  width: 100%;
  padding: 16px;
  text-align: left;
  background: var(--surface);
  border: none;
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.quick-opt:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.quick-opt:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.quick-opt:only-child { border-radius: var(--radius); }
.quick-opt:active { background: var(--surface2); }
.quick-opt-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }

/* Checkbox style for actions */
.check-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  cursor: pointer;
}
.check-row:active { background: var(--surface2); }
.check-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.check-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.check-row:only-child { border-radius: var(--radius); }
.check-box {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--green);
  transition: all 0.15s;
}
.check-box.checked { border-color: var(--green); background: #1e2a1e; }
.check-text { flex: 1; font-size: 14px; }
.check-text.checked { color: var(--text3); text-decoration: line-through; }
.check-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* Person picker in forms */
.person-picker { display: flex; flex-wrap: wrap; gap: 6px; }
.person-chip {
  padding: 6px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.person-chip.selected { background: var(--surface2); border-color: var(--border2); color: var(--text); }

/* Vorlauf input group */
.vorlauf-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.vorlauf-row:last-child { border-bottom: none; }
.vorlauf-name { flex: 1; font-size: 14px; }
.vorlauf-input {
  width: 60px;
  padding: 6px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: var(--mono);
  text-align: center;
  -webkit-appearance: none;
}
.vorlauf-suffix { font-size: 12px; color: var(--text2); font-family: var(--mono); }

/* Settings number input */
.settings-num {
  width: 52px;
  padding: 6px 4px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: var(--mono);
  text-align: center;
  -webkit-appearance: none;
  -moz-appearance: textfield;
}
.settings-num:focus { outline: none; border-color: var(--text3); }
.settings-num::-webkit-inner-spin-button,
.settings-num::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* Person picker overlay (bottom-sheet style) */
.picker-suggestions {
  margin-bottom: 20px;
}
.picker-suggestion-label {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 10px;
  line-height: 1.4;
}
.picker-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.picker-cell {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.1s;
}
.picker-cell:active { background: var(--surface2); }
.picker-cell-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;

}
.picker-cell-name {

  font-weight: 500;

}
.picker-cell-hint {

.picker-divider {

  margin: 16px 0 12px;
  font-size: 11px;
  font-family: var(--mono);

  letter-spacing: 0.08em;
}
.picker-divider::after {
  content: '';
  flex: 1;

}

/* Toast notification */
.toast {
  position: fixed;
  bottom: calc(140px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);

.toast.show {

}
</style>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── Config ───
const SB_URL = 'https://wlpfukxcbzfpylkbnmvf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndscGZ1a3hjYnpmcHlsa2JubXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTE1NTIsImV4cCI6MjA5MDk2NzU1Mn0.-rVLD46EF2ICihoOLa5a5zQsjV_lxbNWTSb4jNBeQDs';

// ─── Settings (persisted locally) ───
const DEFAULT_SETTINGS = { freq_inner: 8, freq_close: 16, freq_mid: 45, freq_loose: 999, bday_vorlauf: 3 };
let settings = { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem('ros_settings') || '{}') };
function saveSettings() { localStorage.setItem('ros_settings', JSON.stringify(settings)); }

// ─── State ───
let kontakte = [];
let anlaesse = [];
let aktionen = [];
let currentTab = 'heute';
let personFilter = 'all';
let personSearch = '';
let collapsedGroups = JSON.parse(localStorage.getItem('ros_collapsed') || '{}');

// ─── Toast ───
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── API helper ───
async function api(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { console.error('API', res.status, await res.text()); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ─── Date helpers ───
function todayDate() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function isoDate(d) {
  if (!d) return null;
  if (typeof d === 'string') return d;
  return d.toISOString().split('T')[0];
}

function todayISO() { return isoDate(todayDate()); }

function parseDate(s) {
  if (!s) return null;
  const parts = s.split('-');
  return new Date(+parts[0], +parts[1]-1, +parts[2]);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function daysBetween(a, b) {
  return Math.floor((b - a) / 86400000);
}

function daysSince(dateStr) {
  if (!dateStr) return 9999;
  return daysBetween(parseDate(dateStr), todayDate());
}

function formatDateGerman(dateStr) {
  if (!dateStr) return '--';
  const d = parseDate(dateStr);
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]}`;
}

function formatDateShort(dateStr) {
  if (!dateStr) return '--';
  const d = parseDate(dateStr);
  return `${d.getDate()}. ${['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()]}`;
}

function formatDaysAgo(n) {
  if (n === 9999) return 'noch nie';
  if (n === 0) return 'heute';
  if (n === 1) return 'gestern';
  return n + ' Tage';
}

function daysUntilBday(bdayStr) {
  if (!bdayStr) return null;
  const b = parseDate(bdayStr);
  const t = todayDate();
  const thisYear = new Date(t.getFullYear(), b.getMonth(), b.getDate());
  if (thisYear < t) thisYear.setFullYear(t.getFullYear() + 1);
  return daysBetween(t, thisYear);
}

// ─── Domain logic ───
function threshold(level) {
  if (level === 'inner') return settings.freq_inner;
  if (level === 'close') return settings.freq_close;
  if (level === 'mid') return settings.freq_mid;
  return settings.freq_loose;
}

function urgency(k) {
  const ds = daysSince(k.last_contact);
  // "noch nie" is neutral, not urgent
  if (ds === 9999) return 'neutral';
  const t = threshold(k.level);
  // locker has no urgency tracking (freq=999)
  if (t >= 999) return 'ok';
  if (ds > t) return 'urgent';
  if (ds > t * 0.75) return 'soon';
  return 'ok';
}

function levelLabel(l) {
  if (l === 'inner') return 'inner circle';
  if (l === 'close') return 'eng';
  if (l === 'mid') return 'mittel';
  return 'locker';
}

function levelOrder(l) {
  if (l === 'inner') return 0;
  if (l === 'close') return 1;
  if (l === 'mid') return 2;
  return 3;
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function avClass(level) {
  if (level === 'inner') return 'av-inner';
  if (level === 'close') return 'av-close';
  if (level === 'mid') return 'av-mid';
  return 'av-loose';
}

function urgClass(urg) {
  if (urg === 'neutral') return 'neutral';
  return urg === 'urgent' ? 'urgent' : urg === 'soon' ? 'soon' : 'ok';
}

// ─── Data loading ───
async function loadAll() {
  const [k, a, ak] = await Promise.all([
    api('kontakte?select=*&order=created_at.desc'),
    api('anlaesse?select=*&order=datum.asc'),
    api('aktionen?select=*&order=created_at.desc')
  ]);
  if (k) kontakte = k;
  if (a) anlaesse = a;
  if (ak) aktionen = ak;
  render();
}

// ─── Tab switching ───
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  const titles = { heute: 'Heute', personen: 'Personen', anlaesse: 'Anlässe', settings: 'Einstellungen' };
  document.getElementById('headerTitle').textContent = titles[tab];
  document.getElementById('fabBtn').style.display = tab === 'settings' ? 'none' : '';
  render();
}

// ─── Main render ───
function render() {
  const body = document.getElementById('appBody');
  if (currentTab === 'heute') renderHeute(body);
  else if (currentTab === 'personen') renderPersonen(body);
  else if (currentTab === 'anlaesse') renderAnlaesse(body);
  else if (currentTab === 'settings') renderSettings(body);
  updateHeaderDate();
}

function updateHeaderDate() {
  const t = todayDate();
  document.getElementById('headerDate').textContent = formatDateGerman(isoDate(t));
}

// ─── HEUTE VIEW ───
function renderHeute(container) {
  let html = '';

  // Overdue people (max 3) — exclude "noch nie" contacts
  const overdue = kontakte
    .filter(k => urgency(k) === 'urgent' && daysSince(k.last_contact) !== 9999)
    .sort((a, b) => daysSince(b.last_contact) - daysSince(a.last_contact))
    .slice(0, 3);

  if (overdue.length) {
    html += '<div class="section"><div class="overdue-banner"><div class="overdue-title">Zu lange nichts gehört</div>';
    overdue.forEach(k => {
      const ds = daysSince(k.last_contact);
      html += `<div class="overdue-person" onclick="openPersonDetail(${k.id})">
        <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
        <div class="overdue-person-name">${esc(k.name)}</div>
        <div class="overdue-person-days">${formatDaysAgo(ds)}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // Build 14-day timeline
  const today = todayDate();
  const todayStr = isoDate(today);
  let hasAnyDay = false;

  html += '<div class="section">';

  for (let i = 0; i < 14; i++) {
    const d = addDays(today, i);
    const dStr = isoDate(d);
    const items = [];

    // Find anlaesse on this day
    anlaesse.forEach(a => {
      let matchDate = a.datum;
      if (a.wiederkehrend || a.typ === 'geburtstag') {
        const orig = parseDate(a.datum);
        const thisYear = new Date(d.getFullYear(), orig.getMonth(), orig.getDate());
        matchDate = isoDate(thisYear);
      }
      if (matchDate === dStr) {
        items.push({ type: 'anlass', anlass: a });
      }
    });

    // Find actions due on this day (vorlauf logic)
    aktionen.forEach(ak => {
      if (ak.erledigt) return;
      const anlass = anlaesse.find(a => a.id === ak.anlass_id);
      if (!anlass) return;

      let anlassDatum = anlass.datum;
      if (anlass.wiederkehrend || anlass.typ === 'geburtstag') {
        const orig = parseDate(anlass.datum);
        const thisYear = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
        if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
        anlassDatum = isoDate(thisYear);
      }

      const dueDate = addDays(parseDate(anlassDatum), -(ak.vorlauf_tage || 0));
      if (isoDate(dueDate) === dStr) {
        const kontakt = kontakte.find(k => k.id === ak.kontakt_id);
        items.push({ type: 'aktion', aktion: ak, anlass, kontakt });
      }
    });

    // Birthday check
    kontakte.forEach(k => {
      if (!k.bday) return;
      const b = parseDate(k.bday);
      const bdayThisYear = new Date(d.getFullYear(), b.getMonth(), b.getDate());
      if (isoDate(bdayThisYear) === dStr) {
        const hasAnlass = anlaesse.some(a => a.typ === 'geburtstag' && a.datum && (() => {
          const orig = parseDate(a.datum);
          return orig.getMonth() === b.getMonth() && orig.getDate() === b.getDate();
        })());
        if (!hasAnlass) {
          items.push({ type: 'birthday', kontakt: k });
        }
      }
      const bdayDate = new Date(d.getFullYear(), b.getMonth(), b.getDate());
      const vorlaufDate = addDays(bdayDate, -settings.bday_vorlauf);
      if (isoDate(vorlaufDate) === dStr && isoDate(bdayDate) !== dStr) {
        const hasAnlass = anlaesse.some(a => a.typ === 'geburtstag');
        if (!hasAnlass) {
          items.push({ type: 'bday-vorlauf', kontakt: k, daysUntil: settings.bday_vorlauf });
        }
      }
    });

    if (items.length === 0) continue;
    hasAnyDay = true;

    const isToday = i === 0;
    const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
    const dayLabel = isToday ? 'Heute' : (i === 1 ? 'Morgen' : dayNames[d.getDay()] + ', ' + d.getDate() + '. ' + ['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()]);

    html += `<div class="day-row">`;
    html += `<div class="day-header ${isToday ? 'day-today' : ''}"><span>${dayLabel}</span></div>`;
    html += '<div class="cards">';

    items.forEach(item => {
      if (item.type === 'anlass') {
        const a = item.anlass;
        const people = aktionen.filter(ak => ak.anlass_id === a.id).map(ak => kontakte.find(k => k.id === ak.kontakt_id)).filter(Boolean);
        html += `<div class="card ok" onclick="openAnlassDetail(${a.id})">
          <div class="card-info">
            <div class="card-name">${esc(a.titel)}</div>
            <div class="card-meta">${people.map(p => esc(p.name)).join(', ') || a.typ}</div>
          </div>
          <div class="card-right"><div class="card-days ok">${a.typ}</div></div>
        </div>`;
      } else if (item.type === 'aktion') {
        const k = item.kontakt;
        const a = item.anlass;
        html += `<div class="card soon" onclick="${k ? `openPersonDetail(${k.id})` : ''}">
          <div class="avatar ${k ? avClass(k.level) : ''}">${k ? initials(k.name) : '--'}</div>
          <div class="card-info">
            <div class="card-name">${esc(item.aktion.was)}</div>
            <div class="card-meta">${k ? esc(k.name) : ''} ${a ? '/ ' + esc(a.titel) : ''}</div>
          </div>
          <div class="card-right"><div class="card-days soon">Vorlauf</div></div>
        </div>`;
      } else if (item.type === 'birthday') {
        const k = item.kontakt;
        html += `<div class="card ok" onclick="openPersonDetail(${k.id})">
          <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
          <div class="card-info">
            <div class="card-name">${esc(k.name)}</div>
            <div class="card-meta">Geburtstag</div>
          </div>
          <div class="card-right"><div class="card-days ok">heute</div></div>
        </div>`;
      } else if (item.type === 'bday-vorlauf') {
        const k = item.kontakt;
        html += `<div class="card soon" onclick="openPersonDetail(${k.id})">
          <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
          <div class="card-info">
            <div class="card-name">${esc(k.name)}</div>
            <div class="card-meta">Geburtstag in ${item.daysUntil} Tagen</div>
          </div>
          <div class="card-right"><div class="card-days soon">Vorlauf</div></div>
        </div>`;
      }
    });

    html += '</div></div>';
  }

  // "Heute möglich" section — quick actions for people you could contact
  const contactable = kontakte
    .filter(k => {
      const urg = urgency(k);
      return urg === 'soon' || urg === 'urgent';
    })
    .filter(k => daysSince(k.last_contact) !== 9999)
    .sort((a, b) => daysSince(b.last_contact) - daysSince(a.last_contact))
    .slice(0, 3);

  if (contactable.length && !overdue.length) {
    html += '<div class="section-label" style="padding-left:20px">Heute möglich</div>';
    html += '<div class="section"><div class="cards">';
    contactable.forEach(k => {
      const ds = daysSince(k.last_contact);
      html += `<div class="card soon" onclick="openPersonDetail(${k.id})">
        <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
        <div class="card-info">
          <div class="card-name">${esc(k.name)}</div>
          <div class="card-meta">Kurz melden? ${formatDaysAgo(ds)}</div>
        </div>
        <div class="card-right"><div class="card-days soon">${formatDaysAgo(ds)}</div></div>
      </div>`;
    });
    html += '</div></div>';
  }

  if (!hasAnyDay && !overdue.length && !contactable.length) {
    html += '<div class="empty-block">Alles im grünen Bereich.</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

// ─── PERSONEN VIEW ───
function renderPersonen(container) {
  let html = '';

  // Search
  html += `<div class="search-bar">
    <input class="search-input" id="personSearchInput" placeholder="Suchen..." value="${esc(personSearch)}" oninput="onPersonSearch(this.value)">
  </div>`;

  // If searching, show flat filtered results
  if (personSearch) {
    const q = personSearch.toLowerCase();
    const list = kontakte.filter(k => k.name.toLowerCase().includes(q));
    html += '<div class="section"><div class="section-label">' + list.length + ' Ergebnisse</div>';
    if (!list.length) {
      html += '<div class="empty-block">Niemand gefunden</div>';
    } else {
      html += '<div class="cards">';
      list.forEach(k => {
        html += renderPersonCard(k);
      });
      html += '</div>';
    }
    html += '</div>';
    container.innerHTML = html;
    const si = document.getElementById('personSearchInput');
    if (si) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
    return;
  }

  // Filters
  html += `<div class="filter-row">
    <button class="filter-btn ${personFilter==='all'?'active':''}" onclick="setPersonFilter('all')">Alle</button>
    <button class="filter-btn ${personFilter==='inner'?'active':''}" onclick="setPersonFilter('inner')">inner</button>
    <button class="filter-btn ${personFilter==='close'?'active':''}" onclick="setPersonFilter('close')">eng</button>
    <button class="filter-btn ${personFilter==='mid'?'active':''}" onclick="setPersonFilter('mid')">mittel</button>
    <button class="filter-btn ${personFilter==='loose'?'active':''}" onclick="setPersonFilter('loose')">locker</button>
  </div>`;

  // If filter active, show flat filtered list
  if (personFilter !== 'all') {
    const list = kontakte.filter(k => k.level === personFilter)
      .sort((a, b) => daysSince(b.last_contact) - daysSince(a.last_contact));
    html += '<div class="section"><div class="section-label">' + list.length + ' ' + levelLabel(personFilter) + '</div>';
    if (!list.length) {
      html += '<div class="empty-block">Niemand in dieser Gruppe</div>';
    } else {
      html += '<div class="cards">';
      list.forEach(k => { html += renderPersonCard(k); });
      html += '</div>';
    }
    html += '</div>';
    container.innerHTML = html;
    return;
  }

  // DEFAULT VIEW: Relevance section + Level groups

  // 1. "Gerade relevant" — urgent/soon people (max 5, horizontal scroll)
  const relevant = kontakte
    .filter(k => {
      const urg = urgency(k);
      return (urg === 'urgent' || urg === 'soon') && daysSince(k.last_contact) !== 9999;
    })
    .sort((a, b) => {
      // urgent first, then by days since
      const ua = urgency(a) === 'urgent' ? 0 : 1;
      const ub = urgency(b) === 'urgent' ? 0 : 1;
      if (ua !== ub) return ua - ub;
      return daysSince(b.last_contact) - daysSince(a.last_contact);
    })
    .slice(0, 5);

  if (relevant.length) {
    html += '<div class="relevance-section">';
    html += '<div class="relevance-question">Wen nicht aus den Augen verlieren?</div>';
    html += '<div class="relevance-cards">';
    relevant.forEach(k => {
      const urg = urgency(k);
      const ds = daysSince(k.last_contact);
      const bday = daysUntilBday(k.bday);
      let hint = formatDaysAgo(ds);
      let hintClass = urgClass(urg);
      if (bday !== null && bday <= 14) {
        hint = 'Geburtstag in ' + bday + 'T';
        hintClass = 'soon';
      }
      html += `<div class="relevance-card" onclick="openPersonDetail(${k.id})">
        <div class="relevance-card-avatar ${avClass(k.level)}">${initials(k.name)}</div>
        <div class="relevance-card-name">${esc(k.name)}</div>
        <div class="relevance-card-hint ${hintClass}">${hint}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // 2. Level groups
  const levels = [
    { key: 'inner', label: 'Inner Circle' },
    { key: 'close', label: 'Eng' },
    { key: 'mid', label: 'Mittel' },
    { key: 'loose', label: 'Locker' }
  ];

  html += '<div class="section">';

  levels.forEach(lvl => {
    const group = kontakte
      .filter(k => k.level === lvl.key)
      .sort((a, b) => {
        // Sort by urgency first, then by name
        const urgOrder = { urgent: 0, soon: 1, neutral: 2, ok: 3 };
        const ua = urgOrder[urgency(a)] ?? 3;
        const ub = urgOrder[urgency(b)] ?? 3;
        if (ua !== ub) return ua - ub;
        return a.name.localeCompare(b.name, 'de');
      });

    if (!group.length) return;

    const isCollapsed = collapsedGroups[lvl.key] === true;
    const chevronSvg = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>';

    html += `<div class="level-group">`;
    html += `<div class="level-group-header" onclick="toggleGroup('${lvl.key}')">
      <span class="level-group-title">${lvl.label}</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span class="level-group-count">${group.length}</span>
        <span class="level-group-chevron ${isCollapsed ? 'collapsed' : ''}">${chevronSvg}</span>
      </span>
    </div>`;

    html += `<div class="level-group-cards ${isCollapsed ? 'collapsed' : ''}">`;
    group.forEach(k => { html += renderPersonCard(k); });
    html += '</div></div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderPersonCard(k) {
  const urg = urgency(k);
  const ds = daysSince(k.last_contact);
  const nextAnlass = findNextAnlassForPerson(k.id);
  const bday = daysUntilBday(k.bday);

  // Build secondary info
  let meta = '';
  if (bday !== null && bday <= 30) {
    meta = 'Geburtstag in ' + bday + 'T';
  } else if (nextAnlass) {
    meta = nextAnlass;
  } else if (k.note) {
    meta = k.note.split('\n')[0].substring(0, 40);
  }

  return `<div class="card ${urgClass(urg)}" onclick="openPersonDetail(${k.id})">
    <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
    <div class="card-info">
      <div class="card-name">${esc(k.name)}</div>
      <div class="card-meta">${meta ? esc(meta) : levelLabel(k.level)}</div>
    </div>
    <div class="card-right">
      <div class="card-days ${urgClass(urg)}">${formatDaysAgo(ds)}</div>
    </div>
  </div>`;
}

function toggleGroup(key) {
  collapsedGroups[key] = !collapsedGroups[key];
  localStorage.setItem('ros_collapsed', JSON.stringify(collapsedGroups));
  render();
}

function findNextAnlassForPerson(kontaktId) {
  const personAktionen = aktionen.filter(a => a.kontakt_id === kontaktId);
  if (!personAktionen.length) return null;
  const today = todayDate();
  let closest = null;
  let closestDays = Infinity;
  personAktionen.forEach(ak => {
    const anlass = anlaesse.find(a => a.id === ak.anlass_id);
    if (!anlass) return;
    let datum = anlass.datum;
    if (anlass.wiederkehrend || anlass.typ === 'geburtstag') {
      const orig = parseDate(datum);
      const thisYear = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
      if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
      datum = isoDate(thisYear);
    }
    const days = daysBetween(today, parseDate(datum));
    if (days >= 0 && days < closestDays) {
      closestDays = days;
      closest = anlass.titel + ' in ' + days + 'T';
    }
  });
  return closest;
}

function onPersonSearch(val) {
  personSearch = val;
  const body = document.getElementById('appBody');
  renderPersonen(body);
}

function setPersonFilter(f) {

}

// ─── ANLAESSE VIEW ───
function renderAnlaesse(container) {
  const today = todayDate();
  const end = addDays(today, 90);

  const upcoming = [];
  anlaesse.forEach(a => {
    let datum;
    if (a.wiederkehrend || a.typ === 'geburtstag') {
      const orig = parseDate(a.datum);
      datum = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
      if (datum < today) datum = new Date(today.getFullYear() + 1, orig.getMonth(), orig.getDate());
    } else {
      datum = parseDate(a.datum);
    }
    if (datum >= today && datum <= end) {
      upcoming.push({ ...a, _effectiveDate: datum, _effectiveDateStr: isoDate(datum) });
    }
  });

  // Auto-birthdays
  kontakte.forEach(k => {
    if (!k.bday) return;
    const b = parseDate(k.bday);
    let bdayDate = new Date(today.getFullYear(), b.getMonth(), b.getDate());
    if (bdayDate < today) bdayDate = new Date(today.getFullYear() + 1, b.getMonth(), b.getDate());
    if (bdayDate > end) return;
    const covered = upcoming.some(u => u.typ === 'geburtstag' && u._effectiveDate.getTime() === bdayDate.getTime());
    if (!covered) {
      upcoming.push({
        id: null,
        titel: 'Geburtstag ' + k.name,
        typ: 'geburtstag',
        wiederkehrend: true,
        _effectiveDate: bdayDate,
        _effectiveDateStr: isoDate(bdayDate),
        _autoKontakt: k
      });
    }
  });

  upcoming.sort((a, b) => a._effectiveDate - b._effectiveDate);

  let html = '<div class="section">';

  if (!upcoming.length) {
    html += '<div class="section-label">Nächste 90 Tage</div>';
    html += '<div class="empty-block">Keine Anlässe geplant</div>';
  } else {
    let currentMonth = '';
    upcoming.forEach(a => {
      const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
      const m = monthNames[a._effectiveDate.getMonth()] + ' ' + a._effectiveDate.getFullYear();
      if (m !== currentMonth) {
        if (currentMonth) html += '</div>';
        currentMonth = m;
        html += `<div class="anlass-month">${m}</div><div class="cards">`;
      }

      const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
      const relAktionen = a.id ? aktionen.filter(ak => ak.anlass_id === a.id) : [];
      const openCount = relAktionen.filter(ak => !ak.erledigt).length;
      const people = relAktionen.map(ak => kontakte.find(k => k.id === ak.kontakt_id)).filter(Boolean);
      const peopleNames = a._autoKontakt ? esc(a._autoKontakt.name) : people.map(p => esc(p.name)).join(', ');

      html += `<div class="anlass-card" onclick="${a.id ? `openAnlassDetail(${a.id})` : ''}">
        <div class="anlass-date-col">
          <div class="anlass-day">${a._effectiveDate.getDate()}</div>
          <div class="anlass-weekday">${dayNames[a._effectiveDate.getDay()]}</div>
        </div>
        <div class="anlass-info">
          <div class="anlass-title">${esc(a.titel)}</div>
          ${peopleNames ? `<div class="anlass-people">${peopleNames}</div>` : ''}
          ${openCount > 0 ? `<div class="anlass-actions-count">${openCount} offen</div>` : ''}
        </div>
        <div class="anlass-typ">${a.typ || ''}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

// ─── PERSON DETAIL ───

  const urg = urgency(k);
  const ds = daysSince(k.last_contact);

  const urgColor = urg === 'urgent' ? 'var(--red)' : urg === 'soon' ? 'var(--amber)' : urg === 'neutral' ? 'var(--text3)' : 'var(--green)';
  const bday = daysUntilBday(k.bday);

  const personAktionen = aktionen.filter(a => a.kontakt_id === id);
  const personAnlassIds = [...new Set(personAktionen.map(a => a.anlass_id))];
  const personAnlaesse = personAnlassIds.map(aid => anlaesse.find(a => a.id === aid)).filter(Boolean);

  const freqLabel = t >= 999 ? 'kein Ziel' : ('alle ' + t + ' Tage');

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayDetail')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>
    <div class="detail-hero">
      <div class="detail-avatar ${avClass(k.level)}">${initials(k.name)}</div>
      <div>
        <div class="detail-name">${esc(k.name)}</div>
        <div class="detail-level">${levelLabel(k.level)}</div>
      </div>
    </div>

    <div class="info-list">
      <div class="info-row"><span class="info-key">Letzter Kontakt</span><span class="info-val">${k.last_contact ? formatDateShort(k.last_contact) : '--'}</span></div>
      <div class="info-row"><span class="info-key">Vor</span><span class="info-val" style="color:${urgColor}">${formatDaysAgo(ds)}</span></div>
      <div class="info-row"><span class="info-key">Ziel</span><span class="info-val">${freqLabel}</span></div>
      <div class="info-row"><span class="info-key">Geburtstag</span><span class="info-val">${k.bday ? formatDateShort(k.bday) + (bday !== null ? ' (in ' + bday + 'T)' : '') : '--'}</span></div>
      ${k.note ? `<div class="info-row"><span class="info-key">Notiz</span><span class="info-val" style="font-family:var(--sans);font-size:13px">${esc(k.note)}</span></div>` : ''}
    </div>

    <div class="section-label">Aktionen</div>
    <div class="action-list">
      <button class="action-btn" onclick="markContacted(${k.id})"><span>Heute gemeldet</span><span class="action-arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12l4-4-4-4"/></svg></span></button>
      <button class="action-btn" onclick="markDranGedacht(${k.id})"><span>Dran gedacht</span><span class="action-arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12l4-4-4-4"/></svg></span></button>
      <button class="action-btn" onclick="openNoteForm(${k.id})"><span>Notiz bearbeiten</span><span class="action-arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12l4-4-4-4"/></svg></span></button>
      <button class="action-btn" onclick="closeOverlay('overlayDetail');openPersonForm(${k.id})"><span>Bearbeiten</span><span class="action-arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12l4-4-4-4"/></svg></span></button>
    </div>`;

  if (personAnlaesse.length) {
    html += '<div class="section-label" style="margin-top:8px">Anlässe</div><div class="cards">';
    personAnlaesse.forEach(a => {
      html += `<div class="card ok" onclick="closeOverlay('overlayDetail');openAnlassDetail(${a.id})">
        <div class="card-info">
          <div class="card-name">${esc(a.titel)}</div>
          <div class="card-meta">${formatDateShort(a.datum)} / ${a.typ}</div>
        </div>
        <div class="card-right"><div class="card-days ok">${a.wiederkehrend ? 'jährlich' : 'einmalig'}</div></div>
      </div>`;
    });
    html += '</div>';
  }

  const openAk = personAktionen.filter(a => !a.erledigt);
  if (openAk.length) {
    html += '<div class="section-label" style="margin-top:8px">Offene Aufgaben</div><div class="cards">';
    openAk.forEach(ak => {
      const anlass = anlaesse.find(a => a.id === ak.anlass_id);
      html += `<div class="check-row" onclick="toggleAktion(${ak.id}, ${k.id})">
        <div class="check-box"></div>
        <div class="check-text">${esc(ak.was)}</div>
        <div class="check-meta">${anlass ? esc(anlass.titel) : ''}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<button class="btn-danger" onclick="deletePerson(${k.id})">Person löschen</button>`;
  html += '</div>';

  const overlay = document.getElementById('overlayDetail');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

async function markContacted(id) {
  const rows = await api(`kontakte?id=eq.${id}`, { method: 'PATCH', body: { last_contact: todayISO() } });
  if (rows && rows[0]) {
    const idx = kontakte.findIndex(k => k.id === id);
    if (idx >= 0) kontakte[idx] = rows[0];
  }
  closeOverlay('overlayDetail');
  showToast('Gemeldet');
  render();
}

async function markDranGedacht(id) {
  const k = kontakte.find(x => x.id === id);
  const rows = await api(`kontakte?id=eq.${id}`, { method: 'PATCH', body: { last_contact: todayISO() } });
  if (rows && rows[0]) {
    const idx = kontakte.findIndex(x => x.id === id);
    if (idx >= 0) kontakte[idx] = rows[0];
  }
  closeOverlay('overlayDetail');
  showToast('Dran gedacht — ' + (k ? k.name : ''));
  render();
}

async function deletePerson(id) {
  if (!confirm('Person wirklich löschen?')) return;
  await api(`aktionen?kontakt_id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  await api(`kontakte?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  aktionen = aktionen.filter(a => a.kontakt_id !== id);
  kontakte = kontakte.filter(k => k.id !== id);
  closeOverlay('overlayDetail');
  render();
}

async function toggleAktion(aktionId, personId) {
  const ak = aktionen.find(a => a.id === aktionId);
  if (!ak) return;
  const rows = await api(`aktionen?id=eq.${aktionId}`, { method: 'PATCH', body: { erledigt: !ak.erledigt } });
  if (rows && rows[0]) {
    const idx = aktionen.findIndex(a => a.id === aktionId);
    if (idx >= 0) aktionen[idx] = rows[0];
  }
  openPersonDetail(personId);
  render();
}

    <button class="back-btn" onclick="closeOverlay('overlayForm')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>

function pfSetLevel(l) {
  document.getElementById('overlayForm').dataset.level = l;
  ['inner','close','mid','loose'].forEach(x => {
    const el = document.getElementById('pf-lv-' + x);
    el.className = 'level-opt' + (x === l ? ' sel-' + x : '');
  });
}

async function savePerson(id) {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) return;
  const level = document.getElementById('overlayForm').dataset.level || 'close';
  const bday = document.getElementById('pf-bday').value || null;
  const last_contact = document.getElementById('pf-last').value || null;
  const note = document.getElementById('pf-note').value.trim() || null;

  const body = { name, level, bday, last_contact, note };

  if (id) {
    const rows = await api(`kontakte?id=eq.${id}`, { method: 'PATCH', body });
    if (rows && rows[0]) {
      const idx = kontakte.findIndex(k => k.id === id);
      if (idx >= 0) kontakte[idx] = rows[0];
    }
  } else {
    const rows = await api('kontakte', { method: 'POST', body });
    if (rows && rows[0]) kontakte.unshift(rows[0]);
  }

  closeOverlay('overlayForm');
  showToast(id ? 'Gespeichert' : 'Person eingetragen');
  render();
}

async function saveNote(personId) {

// ─── ANLASS DETAIL ───
function openAnlassDetail(id) {
  const a = anlaesse.find(x => x.id === id);
  if (!a) return;

  const relAktionen = aktionen.filter(ak => ak.anlass_id === id);
  const today = todayDate();
  let effectiveDate = a.datum;
  if (a.wiederkehrend || a.typ === 'geburtstag') {
    const orig = parseDate(a.datum);
    const thisYear = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
    if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
    effectiveDate = isoDate(thisYear);
  }

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayAnlassDetail')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>
    <div class="form-title">${esc(a.titel)}</div>
    <div class="info-list">
      <div class="info-row"><span class="info-key">Datum</span><span class="info-val">${formatDateGerman(effectiveDate)}</span></div>
      <div class="info-row"><span class="info-key">Typ</span><span class="info-val">${a.typ}</span></div>
      <div class="info-row"><span class="info-key">Wiederkehrend</span><span class="info-val">${a.wiederkehrend ? 'ja' : 'nein'}</span></div>
      ${a.notiz ? `<div class="info-row" style="flex-direction:column;align-items:flex-start;gap:6px"><span class="info-key">Notiz</span><span class="info-val" style="font-family:var(--sans);font-size:13px;max-width:100%;white-space:pre-wrap;line-height:1.5">${esc(a.notiz)}</span></div>` : ''}
    </div>`;

  if (relAktionen.length) {
    html += '<div class="section-label">Aufgaben</div><div class="cards">';
    relAktionen.forEach(ak => {
      const k = kontakte.find(x => x.id === ak.kontakt_id);
      const checkedClass = ak.erledigt ? 'checked' : '';
      html += `<div class="check-row" onclick="toggleAktionAnlass(${ak.id}, ${a.id})">
        <div class="check-box ${checkedClass}">${ak.erledigt ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg>' : ''}</div>
        <div class="check-text ${checkedClass}">${esc(ak.was)}</div>
        <div class="check-meta">${k ? esc(k.name) : ''} / ${ak.vorlauf_tage || 0}T Vorlauf</div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<div style="margin-top:16px">
    <button class="btn-primary" onclick="openAktionForm(${a.id})" style="width:100%">Aufgabe hinzufügen</button>
  </div>`;

  html += `<div style="margin-top:8px;display:flex;gap:8px">
    <button class="btn-secondary" style="flex:1" onclick="closeOverlay('overlayAnlassDetail');openAnlassForm(${a.id})">Bearbeiten</button>
    <button class="btn-secondary" style="flex:1;color:var(--red);border-color:#3a2020" onclick="deleteAnlass(${a.id})">Löschen</button>
  </div>`;

  html += '</div>';

  const overlay = document.getElementById('overlayAnlassDetail');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

async function toggleAktionAnlass(aktionId, anlassId) {
  const ak = aktionen.find(a => a.id === aktionId);
  if (!ak) return;
  const rows = await api(`aktionen?id=eq.${aktionId}`, { method: 'PATCH', body: { erledigt: !ak.erledigt } });
  if (rows && rows[0]) {
    const idx = aktionen.findIndex(a => a.id === aktionId);
    if (idx >= 0) aktionen[idx] = rows[0];
  }
  openAnlassDetail(anlassId);
}

async function deleteAnlass(id) {
  if (!confirm('Anlass wirklich löschen?')) return;
  await api(`aktionen?anlass_id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  await api(`anlaesse?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  aktionen = aktionen.filter(a => a.anlass_id !== id);
  anlaesse = anlaesse.filter(a => a.id !== id);
  closeOverlay('overlayAnlassDetail');
  render();
}

// ─── ANLASS FORM ───
function openAnlassForm(id) {
  const a = id ? anlaesse.find(x => x.id === id) : null;
  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayAnlassForm')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>
    <div class="form-title">${a ? 'Anlass bearbeiten' : 'Neuer Anlass'}</div>
    <div class="form-group">
      <label class="form-label">Titel</label>
      <input class="form-input" id="af-titel" value="${a ? esc(a.titel) : ''}" placeholder="z.B. Weihnachten" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Datum</label>
      <input class="form-input" id="af-datum" type="date" value="${a ? a.datum : ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Typ</label>
      <select class="form-input" id="af-typ">
        <option value="feiertag" ${a && a.typ==='feiertag'?'selected':''}>feiertag</option>
        <option value="geburtstag" ${a && a.typ==='geburtstag'?'selected':''}>geburtstag</option>
        <option value="einmalig" ${a && a.typ==='einmalig'?'selected':''}>einmalig</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Wiederkehrend</label>
      <div class="level-select">
        <button class="level-opt ${(!a || a.wiederkehrend) ? 'sel-mid' : ''}" onclick="afSetWdk(true)" id="af-wdk-yes">ja</button>
        <button class="level-opt ${a && !a.wiederkehrend ? 'sel-close' : ''}" onclick="afSetWdk(false)" id="af-wdk-no">nein</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notiz (optional)</label>
      <textarea class="form-input" id="af-notiz" rows="3" placeholder="z.B. Geschenkideen, Details...">${a && a.notiz ? esc(a.notiz) : ''}</textarea>
    </div>`;

  if (!a) {
    html += `<div class="form-group">
      <label class="form-label">Personen zuordnen</label>
      <div class="person-picker" id="af-people">`;
    kontakte.forEach(k => {
      html += `<button class="person-chip" data-kid="${k.id}" onclick="this.classList.toggle('selected')">${esc(k.name)}</button>`;
    });
    html += '</div></div>';
    html += `<div class="form-group">
      <label class="form-label">Was ist zu tun?</label>
      <input class="form-input" id="af-was" placeholder="z.B. Geschenk besorgen" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Vorlauf (Tage)</label>
      <input class="form-input" id="af-vorlauf" type="number" value="3" min="0" style="width:80px">
    </div>`;
  }

  html += `<div class="form-actions">
      <button class="btn-secondary" onclick="closeOverlay('overlayAnlassForm')">Abbrechen</button>
      <button class="btn-primary" onclick="saveAnlass(${id || 'null'})">Speichern</button>
    </div>
  </div>`;

  const overlay = document.getElementById('overlayAnlassForm');
  overlay.innerHTML = html;
  overlay.classList.add('open');
  overlay.dataset.wiederkehrend = a ? String(a.wiederkehrend) : 'true';
}

function afSetWdk(val) {
  document.getElementById('overlayAnlassForm').dataset.wiederkehrend = String(val);
  document.getElementById('af-wdk-yes').className = 'level-opt' + (val ? ' sel-mid' : '');
  document.getElementById('af-wdk-no').className = 'level-opt' + (!val ? ' sel-close' : '');
}

async function saveAnlass(id) {
  const titel = document.getElementById('af-titel').value.trim();
  if (!titel) return;
  const datum = document.getElementById('af-datum').value;
  if (!datum) return;
  const typ = document.getElementById('af-typ').value;
  const wiederkehrend = document.getElementById('overlayAnlassForm').dataset.wiederkehrend === 'true';
  const notiz = document.getElementById('af-notiz').value.trim() || null;

  const body = { titel, datum, typ, wiederkehrend, notiz };

  if (id) {
    const rows = await api(`anlaesse?id=eq.${id}`, { method: 'PATCH', body });
    if (rows && rows[0]) {
      const idx = anlaesse.findIndex(a => a.id === id);
      if (idx >= 0) anlaesse[idx] = rows[0];
    }
  } else {
    const rows = await api('anlaesse', { method: 'POST', body });
    if (rows && rows[0]) {
      anlaesse.push(rows[0]);

      const newAnlassId = rows[0].id;
      const wasInput = document.getElementById('af-was');
      const vorlaufInput = document.getElementById('af-vorlauf');
      const was = wasInput ? wasInput.value.trim() : '';
      const vorlauf = vorlaufInput ? parseInt(vorlaufInput.value) || 0 : 0;

      const selectedPeople = document.querySelectorAll('#af-people .person-chip.selected');
      for (const chip of selectedPeople) {
        const kid = parseInt(chip.dataset.kid);
        const akBody = {
          anlass_id: newAnlassId,
          kontakt_id: kid,
          was: was || titel,
          vorlauf_tage: vorlauf,
          erledigt: false
        };
        const akRows = await api('aktionen', { method: 'POST', body: akBody });
        if (akRows && akRows[0]) aktionen.push(akRows[0]);
      }
    }
  }

  closeOverlay('overlayAnlassForm');
  showToast('Anlass gespeichert');
  render();
}

// ─── AKTION FORM ───
function openAktionForm(anlassId) {
  const a = anlaesse.find(x => x.id === anlassId);
  if (!a) return;

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayAktionForm')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>
    <div class="form-title">Aufgabe hinzufügen</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px;font-family:var(--mono)">${esc(a.titel)}</div>
    <div class="form-group">
      <label class="form-label">Person</label>
      <select class="form-input" id="akf-person">
        ${kontakte.map(k => `<option value="${k.id}">${esc(k.name)}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Was</label>
      <input class="form-input" id="akf-was" placeholder="z.B. Karte schreiben" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Vorlauf (Tage)</label>
      <input class="form-input" id="akf-vorlauf" type="number" value="3" min="0" style="width:80px">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeOverlay('overlayAktionForm')">Abbrechen</button>
      <button class="btn-primary" onclick="saveAktion(${anlassId})">Speichern</button>
    </div>
  </div>`;

  const overlay = document.getElementById('overlayAktionForm');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

async function saveAktion(anlassId) {
  const kontakt_id = parseInt(document.getElementById('akf-person').value);
  const was = document.getElementById('akf-was').value.trim();
  if (!was) return;
  const vorlauf_tage = parseInt(document.getElementById('akf-vorlauf').value) || 0;

  const body = { anlass_id: anlassId, kontakt_id, was, vorlauf_tage, erledigt: false };
  const rows = await api('aktionen', { method: 'POST', body });
  if (rows && rows[0]) aktionen.push(rows[0]);

  closeOverlay('overlayAktionForm');
  openAnlassDetail(anlassId);
}

// ─── QUICK ENTRY (Eintragen) ───
function openQuickEntry() {
  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayQuick')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>
    <div class="form-title">Eintragen</div>

    <div class="quick-options">
      <button class="quick-opt" onclick="closeOverlay('overlayQuick');quickGemeldet()">
        <span>Heute gemeldet</span>
        <span class="quick-opt-sub">Person wählen</span>
      </button>
      <button class="quick-opt" onclick="closeOverlay('overlayQuick');quickDranGedacht()">
        <span>Dran gedacht</span>
        <span class="quick-opt-sub">Person wählen</span>
      </button>
      <button class="quick-opt" onclick="closeOverlay('overlayQuick');openPersonForm(null)">
        <span>Person eintragen</span>
        <span class="quick-opt-sub">neue Person</span>
      </button>
      <button class="quick-opt" onclick="closeOverlay('overlayQuick');openAnlassForm(null)">
        <span>Neuer Anlass</span>
        <span class="quick-opt-sub">Anlass erstellen</span>
      </button>
    </div>
  </div>`;

  const overlay = document.getElementById('overlayQuick');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

function renderPersonPicker(title, onSelect) {
  // Sort by relevance: urgent/soon first, then recently active
  const urgent = kontakte.filter(k => urgency(k) === 'urgent' && daysSince(k.last_contact) !== 9999);
  const soon = kontakte.filter(k => urgency(k) === 'soon');
  const suggestions = [...urgent, ...soon].slice(0, 6);

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayQuick')"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg> Zurück</button>
    <div class="form-title">${title}</div>`;

  // Suggestions grid
  if (suggestions.length) {
    html += '<div class="picker-suggestions">';
    html += '<div class="picker-suggestion-label">Passt gerade?</div>';
    html += '<div class="picker-grid">';
    suggestions.forEach(k => {
      const ds = daysSince(k.last_contact);
      html += `<div class="picker-cell" onclick="${onSelect}(${k.id})">
        <div class="picker-cell-avatar ${avClass(k.level)}">${initials(k.name)}</div>
        <div class="picker-cell-name">${esc(k.name)}</div>
        <div class="picker-cell-hint">${formatDaysAgo(ds)}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // Search
  html += `<div style="margin-bottom:12px">
    <input class="search-input" placeholder="Suchen..." oninput="filterPickerList(this.value)">
  </div>`;

  // All contacts
  html += '<div class="picker-divider">Alle</div>';
  html += '<div class="cards" id="pickerAllList">';
  const sorted = kontakte.slice().sort((a, b) => a.name.localeCompare(b.name, 'de'));
  sorted.forEach(k => {
    const ds = daysSince(k.last_contact);
    const urg = urgency(k);
    html += `<div class="card ${urgClass(urg)}" data-name="${esc(k.name.toLowerCase())}" onclick="${onSelect}(${k.id})">
      <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
      <div class="card-info">
        <div class="card-name">${esc(k.name)}</div>
        <div class="card-meta">${levelLabel(k.level)}</div>
      </div>
      <div class="card-right"><div class="card-days ${urgClass(urg)}">${formatDaysAgo(ds)}</div></div>
    </div>`;
  });

  html += '</div></div>';
  return html;
}

function filterPickerList(q) {
  const cards = document.querySelectorAll('#pickerAllList .card');
  q = q.toLowerCase();
  cards.forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? '' : 'none';
  });
}

function quickGemeldet() {
  const overlay = document.getElementById('overlayQuick');
  overlay.innerHTML = renderPersonPicker('An wen hast du dich gemeldet?', 'doQuickGemeldet');
  overlay.classList.add('open');
}

async function doQuickGemeldet(id) {
  await markContacted(id);
  closeOverlay('overlayQuick');
}

function quickDranGedacht() {
  const overlay = document.getElementById('overlayQuick');
  overlay.innerHTML = renderPersonPicker('An wen hast du gedacht?', 'doQuickDranGedacht');
  overlay.classList.add('open');
}

async function doQuickDranGedacht(id) {
  await markDranGedacht(id);
  closeOverlay('overlayQuick');
}

// ─── SETTINGS VIEW ───
function renderSettings(container) {
  let html = '<div class="section">';

  html += '<div class="section-label">Frequenz — wie oft melden</div>';
  html += '<div class="info-list">';
  html += `<div class="info-row">
    <span class="info-key">inner circle</span>
    <span class="info-val" style="display:flex;align-items:center;gap:6px">
      alle <input type="number" class="settings-num" id="set-freq-inner" value="${settings.freq_inner}" min="1" max="365" onchange="updateSetting('freq_inner', this.value)"> Tage
    </span>
  </div>`;
  html += `<div class="info-row">
    <span class="info-key">eng</span>
    <span class="info-val" style="display:flex;align-items:center;gap:6px">
      alle <input type="number" class="settings-num" id="set-freq-close" value="${settings.freq_close}" min="1" max="365" onchange="updateSetting('freq_close', this.value)"> Tage
    </span>
  </div>`;
  html += `<div class="info-row">
    <span class="info-key">mittel</span>
    <span class="info-val" style="display:flex;align-items:center;gap:6px">
      alle <input type="number" class="settings-num" id="set-freq-mid" value="${settings.freq_mid}" min="1" max="365" onchange="updateSetting('freq_mid', this.value)"> Tage
    </span>
  </div>`;
  html += `<div class="info-row">
    <span class="info-key">locker</span>
    <span class="info-val" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)">
      kein Tracking
    </span>
  </div>`;
  html += '</div>';

  html += '<div class="section-label">Geburtstag — Standard-Vorlauf</div>';
  html += '<div class="info-list">';
  html += `<div class="info-row">
    <span class="info-key">Vorlauf</span>
    <span class="info-val" style="display:flex;align-items:center;gap:6px">
      <input type="number" class="settings-num" id="set-bday-vorlauf" value="${settings.bday_vorlauf}" min="0" max="30" onchange="updateSetting('bday_vorlauf', this.value)"> Tage vorher
    </span>
  </div>`;
  html += '</div>';

  html += `<div style="padding:20px 0;font-size:12px;color:var(--text3);font-family:var(--mono);line-height:1.7;text-align:center">
    Frequenz bestimmt, ab wann eine Person<br>als "zu lange nichts gehört" gilt.<br><br>
    inner circle = engste Menschen (${settings.freq_inner}T)<br>
    eng = enge Freunde, Familie (${settings.freq_close}T)<br>
    mittel = gute Bekannte (${settings.freq_mid}T)<br>
    locker = kein Tracking<br><br>
    Einstellungen werden lokal gespeichert.
  </div>`;

  html += `<button class="btn-secondary" style="width:100%;text-align:center" onclick="resetSettings()">Auf Standard zurücksetzen</button>`;

  html += '</div>';
  container.innerHTML = html;
}

function updateSetting(key, value) {
  settings[key] = parseInt(value) || DEFAULT_SETTINGS[key];
  saveSettings();
}

function resetSettings() {
  settings = { ...DEFAULT_SETTINGS };
  saveSettings();
  render();
}

// ─── Utility ───
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
}

// ─── Init ───
updateHeaderDate();
loadAll();
</script>
