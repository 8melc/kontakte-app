<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dran">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>Dran</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2a2a2a;
  --border2: #333333;
  --text: #f0ede8;
  --text2: #888880;
  --text3: #555550;
  --red: #e05a4e;
  --amber: #e0944e;
  --green: #7ec87e;
  --radius: 12px;
  --radius-sm: 8px;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
input, textarea, button, select { font-family: var(--sans); }

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
}
.app-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

/* Header */
.header {
  padding: 52px 20px 14px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.header-date { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: var(--bg); border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner {
  max-width: 430px; margin: 0 auto; display: flex;
  align-items: center; height: 56px;
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; background: none; border: none;
  color: var(--text3); cursor: pointer; height: 100%;
  font-size: 10px; font-family: var(--mono); letter-spacing: 0.05em;
  text-transform: uppercase; transition: color 0.15s;
}
.nav-tab.active { color: var(--text); }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; margin-bottom: 2px; }
.nav-tab.active .nav-dot { background: var(--text); }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(68px + env(safe-area-inset-bottom));
  right: max(16px, calc((100vw - 430px)/2 + 16px));
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--text); color: var(--bg); border: none;
  font-size: 24px; font-weight: 300; cursor: pointer; z-index: 51;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* Sections */
.section { padding: 0 20px; margin-bottom: 12px; }
.section-label {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  letter-spacing: 0.12em; text-transform: uppercase; padding: 16px 0 8px;
}

/* Lead question */
.lead-q {
  font-size: 16px; font-weight: 500; color: var(--text2);
  padding: 20px 20px 4px; line-height: 1.4;
}

/* Cards */
.cards { display: flex; flex-direction: column; gap: 1px; }
.card {
  background: var(--surface); padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; border-left: 3px solid transparent;
  transition: background 0.1s;
}
.card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.card:only-child { border-radius: var(--radius); }
.card:active { background: var(--surface2); }
.card.urgent { border-left-color: var(--red); }
.card.soon { border-left-color: var(--amber); }
.card.ok { border-left-color: var(--green); }
.card.neutral { border-left-color: transparent; }

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
  font-family: var(--mono); background: var(--surface2); color: var(--text2);
}
.av-inner { background: #2a1e1e; color: var(--red); }
.av-close { background: #1e1e2a; color: #8888cc; }
.av-mid { background: #1e2a1e; color: var(--green); }
.av-loose { background: #222220; color: var(--text3); }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 500; }
.card-meta {
  font-size: 12px; color: var(--text2); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: var(--mono);
}
.card-right { text-align: right; flex-shrink: 0; }
.card-days { font-size: 12px; font-family: var(--mono); }
.card-days.urgent { color: var(--red); }
.card-days.soon { color: var(--amber); }
.card-days.ok { color: var(--green); }
.card-days.neutral { color: var(--text3); }

.empty-block {
  padding: 20px 16px; text-align: center; color: var(--text3);
  font-size: 13px; background: var(--surface); border-radius: var(--radius);
}

/* Heute day rows */
.day-row { margin-bottom: 16px; }
.day-header {
  font-size: 13px; font-weight: 500; margin-bottom: 6px;
  display: flex; align-items: baseline; gap: 8px;
}
.day-header-date { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.day-today { color: var(--red); }

/* Overdue banner */
.overdue-banner {
  background: var(--surface); border: 1px solid #2a2020;
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
}
.overdue-title {
  font-size: 10px; font-family: var(--mono); color: var(--red);
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px;
}
.overdue-person {
  display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer;
}
.overdue-person-name { font-size: 14px; font-weight: 500; flex: 1; }
.overdue-person-days { font-size: 12px; font-family: var(--mono); color: var(--red); }

/* Heute motivation blocks */
.motivation-block {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
}
.motivation-label {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}
.mini-action {
  display: flex; align-items: center; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.mini-action:last-child { border-bottom: none; }
.mini-action:active { opacity: 0.7; }
.mini-action-text { flex: 1; font-size: 14px; }
.mini-action-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.mini-action-arrow { color: var(--text3); font-family: var(--mono); font-size: 14px; }

/* Search */
.search-bar { padding: 8px 20px 4px; }
.search-input {
  width: 100%; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
  -webkit-appearance: none;
}
.search-input:focus { outline: none; border-color: var(--border2); }
.search-input::placeholder { color: var(--text3); }

/* Filter */
.filter-row { display: flex; gap: 6px; padding: 8px 20px 0; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border); background: transparent;
  font-size: 12px; color: var(--text2); cursor: pointer;
  font-family: var(--sans); transition: all 0.15s;
}
.filter-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

/* Group header for person list */
.group-header {
  font-size: 11px; font-family: var(--mono); color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px 0 6px; position: sticky; top: 0;
  background: var(--bg); z-index: 1;
}

/* Relevance highlight card */
.relevance-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border);
  transition: background 0.1s;
}
.relevance-card:active { background: var(--surface2); }
.relevance-reason { font-size: 11px; color: var(--amber); font-family: var(--mono); margin-top: 2px; }

/* Anlässe timeline */
.anlass-month {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  letter-spacing: 0.12em; text-transform: uppercase; padding: 16px 0 8px;
}
.anlass-card {
  background: var(--surface); padding: 13px 16px;
  display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
}
.anlass-card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.anlass-card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.anlass-card:only-child { border-radius: var(--radius); }
.anlass-card:active { background: var(--surface2); }
.anlass-date-col { flex-shrink: 0; width: 44px; text-align: center; }
.anlass-day { font-size: 20px; font-weight: 600; font-family: var(--mono); }
.anlass-weekday { font-size: 10px; font-family: var(--mono); color: var(--text2); text-transform: uppercase; }
.anlass-info { flex: 1; min-width: 0; }
.anlass-title { font-size: 14px; font-weight: 500; }
.anlass-people { font-size: 12px; color: var(--text2); margin-top: 2px; }
.anlass-actions-count { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 3px; }
.anlass-typ {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  font-family: var(--mono); background: var(--surface2);
  color: var(--text2); flex-shrink: 0; align-self: center;
}

/* Overlay */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 100; overflow-y: auto;
  -webkit-overflow-scrolling: touch; display: none;
}
.overlay.open { display: block; }
.overlay-inner {
  max-width: 430px; margin: 0 auto;
  padding: 52px 20px calc(32px + env(safe-area-inset-bottom));
}

/* Bottom sheet */
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); z-index: 200;
  border-radius: var(--radius) var(--radius) 0 0;
  max-height: 70vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 env(safe-area-inset-bottom);
  transform: translateY(100%);
  transition: transform 0.25s ease;
  display: none;
}
.bottom-sheet.open { display: block; transform: translateY(0); }
.bottom-sheet-inner { max-width: 430px; margin: 0 auto; padding: 20px; }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 0 auto 16px;
}
.sheet-backdrop {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 199;
  display: none;
}
.sheet-backdrop.open { display: block; }

/* Back button */
.back-btn {
  background: transparent; border: none; color: var(--text2);
  font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 20px;
  font-family: var(--sans); display: flex; align-items: center; gap: 6px;
}

/* Form elements */
.form-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 11px; font-family: var(--mono); color: var(--text2);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; display: block;
}
.form-input {
  width: 100%; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text); font-size: 15px;
  -webkit-appearance: none;
}
.form-input:focus { outline: none; border-color: var(--text3); }
.form-input::placeholder { color: var(--text3); }
.form-input[type="date"] { color-scheme: dark; }
textarea.form-input { resize: vertical; min-height: 80px; font-family: var(--sans); }
select.form-input { color-scheme: dark; }

.level-select { display: flex; gap: 6px; }
.level-opt {
  flex: 1; padding: 10px 6px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  font-size: 12px; color: var(--text2); cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.level-opt.sel-inner { background: #2a1e1e; border-color: var(--red); color: var(--red); }
.level-opt.sel-close { background: #1e1e2a; border-color: #8888cc; color: #8888cc; }
.level-opt.sel-mid { background: #1e2a1e; border-color: var(--green); color: var(--green); }
.level-opt.sel-loose { background: #222220; border-color: var(--border2); color: var(--text2); }

.form-actions { display: flex; gap: 8px; margin-top: 24px; }
.btn-primary {
  flex: 1; padding: 14px; border-radius: var(--radius-sm);
  border: none; background: var(--text); color: var(--bg);
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-primary:active { opacity: 0.85; }
.btn-secondary {
  padding: 14px 20px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: transparent;
  color: var(--text2); font-size: 15px; cursor: pointer;
}
.btn-danger {
  width: 100%; padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid #3a2020; background: transparent;
  color: var(--red); font-size: 14px; cursor: pointer; margin-top: 12px;
}

/* Detail view */
.detail-hero { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.detail-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 600; font-family: var(--mono);
}
.detail-name { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.detail-level { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-top: 2px; }

.info-list {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--text2); }
.info-val { font-weight: 500; font-family: var(--mono); font-size: 13px; text-align: right; max-width: 60%; }

.action-list { display: flex; flex-direction: column; gap: 1px; margin-bottom: 16px; }
.action-btn {
  width: 100%; padding: 14px 16px; text-align: left;
  background: var(--surface); border: none; border-radius: 0;
  color: var(--text); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
}
.action-btn:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.action-btn:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.action-btn:only-child { border-radius: var(--radius); }
.action-btn:active { background: var(--surface2); }
.action-btn.danger { color: var(--red); }
.action-arrow { color: var(--text3); font-family: var(--mono); }

/* Quick entry */
.quick-options { display: flex; flex-direction: column; gap: 1px; margin-bottom: 20px; }
.quick-opt {
  width: 100%; padding: 16px; text-align: left;
  background: var(--surface); border: none; color: var(--text);
  font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
}
.quick-opt:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.quick-opt:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.quick-opt:only-child { border-radius: var(--radius); }
.quick-opt:active { background: var(--surface2); }
.quick-opt-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }

/* Checkbox */
.check-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--surface); cursor: pointer;
}
.check-row:active { background: var(--surface2); }
.check-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.check-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.check-row:only-child { border-radius: var(--radius); }
.check-box {
  width: 20px; height: 20px; border-radius: 4px;
  border: 1.5px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-family: var(--mono); color: var(--green);
  transition: all 0.15s;
}
.check-box.checked { border-color: var(--green); background: #1e2a1e; }
.check-text { flex: 1; font-size: 14px; }
.check-text.checked { color: var(--text3); text-decoration: line-through; }
.check-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* Person picker in bottom sheet */
.picker-person {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.picker-person:last-child { border-bottom: none; }
.picker-person:active { opacity: 0.7; }
.picker-person.selected { opacity: 1; }
.picker-person.selected .avatar { border: 2px solid var(--text); }
.picker-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.picker-check.on { border-color: var(--green); background: #1e2a1e; }

/* Step indicator for Anlass flow */
.step-indicator {
  display: flex; gap: 4px; padding: 0 0 20px;
}
.step-dot {
  width: 32px; height: 3px; border-radius: 2px;
  background: var(--border);
  transition: background 0.2s;
}
.step-dot.active { background: var(--text); }
.step-dot.done { background: var(--text3); }

/* Step content */
.step-content { min-height: 200px; }
.step-q {
  font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
  margin-bottom: 20px; line-height: 1.3;
}

/* Expandable */
.expand-toggle {
  width: 100%; padding: 12px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text2); font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--sans); margin-top: 8px;
}
.expand-toggle:active { background: var(--surface2); }
.expand-body { display: none; margin-top: 1px; }
.expand-body.open { display: block; }

/* Settings */
.settings-num {
  width: 52px; padding: 6px 4px; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--text); font-size: 14px; font-family: var(--mono);
  text-align: center; -webkit-appearance: none; -moz-appearance: textfield;
}
.settings-num:focus { outline: none; border-color: var(--text3); }
.settings-num::-webkit-inner-spin-button,
.settings-num::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* Confirm toast */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 20px;
  font-size: 14px; color: var(--text); z-index: 300;
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none; font-family: var(--mono);
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-title" id="headerTitle">Heute</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="app-body" id="appBody"></div>
</div>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-tab active" data-tab="heute" onclick="switchTab('heute')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M2 6h12"/><circle cx="8" cy="10" r="1" fill="currentColor"/></svg>
      Heute
    </button>
    <button class="nav-tab" data-tab="personen" onclick="switchTab('personen')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="5" r="2.5"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg>
      Personen
    </button>
    <button class="nav-tab" data-tab="anlaesse" onclick="switchTab('anlaesse')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v4M11 1v4M2 7h12"/></svg>
      Anlässe
    </button>
    <button class="nav-tab" data-tab="settings" onclick="switchTab('settings')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
      Mehr
    </button>

</div>

<button class="fab" id="fabBtn" onclick="openQuickEntry()"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4v14M4 11h14"/></svg></button>

<div class="bottom-sheet" id="personSheet"></div>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── Config ───
const SB_URL = 'https://wlpfukxcbzfpylkbnmvf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndscGZ1a3hjYnpmcHlsa2JubXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTE1NTIsImV4cCI6MjA5MDk2NzU1Mn0.-rVLD46EF2ICihoOLa5a5zQsjV_lxbNWTSb4jNBeQDs';

// ─── Settings ───
const DEFAULT_SETTINGS = { freq_inner: 8, freq_close: 16, freq_mid: 45, freq_loose: 999, bday_vorlauf: 3 };
let settings = { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem('ros_settings') || '{}') };
function saveSettings() { localStorage.setItem('ros_settings', JSON.stringify(settings)); }

// ─── State ───
let kontakte = [];
let anlaesse = [];
let aktionen = [];
let currentTab = 'heute';
let personFilter = 'all';
let personSearch = '';

// ─── API ───
async function api(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { console.error('API', res.status, await res.text()); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ─── Date helpers ───
function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function isoDate(d) { if (!d) return null; if (typeof d === 'string') return d; return d.toISOString().split('T')[0]; }
function todayISO() { return isoDate(todayDate()); }
function parseDate(s) { if (!s) return null; const p = s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function daysBetween(a, b) { return Math.floor((b - a) / 86400000); }
function daysSince(dateStr) { if (!dateStr) return 9999; return daysBetween(parseDate(dateStr), todayDate()); }

function formatDateGerman(dateStr) {
  if (!dateStr) return '--';
  const d = parseDate(dateStr);
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]}`;
}

function formatDateShort(dateStr) {
  if (!dateStr) return '--';
  const d = parseDate(dateStr);
  return `${d.getDate()}. ${['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()]}`;
}

function formatDaysAgo(n) {
  if (n === 9999) return 'noch nie';
  if (n === 0) return 'heute';
  if (n === 1) return 'gestern';
  return n + ' Tage';
}

function daysUntilBday(bdayStr) {
  if (!bdayStr) return null;
  const b = parseDate(bdayStr);
  const t = todayDate();
  const thisYear = new Date(t.getFullYear(), b.getMonth(), b.getDate());
  if (thisYear < t) thisYear.setFullYear(t.getFullYear() + 1);
  return daysBetween(t, thisYear);
}

// ─── Domain logic ───
function threshold(level) {
  return level === 'inner' ? settings.freq_inner : level === 'close' ? settings.freq_close : level === 'mid' ? settings.freq_mid : settings.freq_loose;
}

function urgency(k) {
  if (!k.last_contact) return 'neutral';
  const ds = daysSince(k.last_contact);
  const t = threshold(k.level);
  if (ds > t) return 'urgent';
  if (ds > t * 0.75) return 'soon';
  return 'ok';
}

function levelLabel(l) {
  return l === 'inner' ? 'inner' : l === 'close' ? 'eng' : l === 'mid' ? 'mittel' : 'locker';
}

function initials(name) { return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function avClass(level) { return level === 'inner' ? 'av-inner' : level === 'close' ? 'av-close' : level === 'mid' ? 'av-mid' : 'av-loose'; }
function urgClass(urg) { return urg === 'urgent' ? 'urgent' : urg === 'soon' ? 'soon' : urg === 'neutral' ? 'neutral' : 'ok'; }

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

const chevron = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12l4-4-4-4"/></svg>';
const backSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>';
const checkSvg = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg>';

// ─── Data loading ───
async function loadAll() {
  const [k, a, ak] = await Promise.all([
    api('kontakte?select=*&order=created_at.desc'),
    api('anlaesse?select=*&order=datum.asc'),
    api('aktionen?select=*&order=created_at.desc')
  ]);
  if (k) kontakte = k;
  if (a) anlaesse = a;
  if (ak) aktionen = ak;
  render();
}

// ─── Tab switching ───
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const titles = { heute: 'Heute', personen: 'Personen', anlaesse: 'Anlässe', settings: 'Einstellungen' };
  document.getElementById('headerTitle').textContent = titles[tab];
  document.getElementById('fabBtn').style.display = tab === 'settings' ? 'none' : '';
  render();
}

function render() {
  const body = document.getElementById('appBody');
  if (currentTab === 'heute') renderHeute(body);
  else if (currentTab === 'personen') renderPersonen(body);
  else if (currentTab === 'anlaesse') renderAnlaesse(body);
  else if (currentTab === 'settings') renderSettings(body);
  updateHeaderDate();
}

function updateHeaderDate() {
  document.getElementById('headerDate').textContent = formatDateGerman(todayISO());
}

// ─── HEUTE ───
function renderHeute(container) {
  let html = '';

  // Overdue (max 3)
  const overdue = kontakte
    .filter(k => urgency(k) === 'urgent' && k.last_contact)
    .sort((a, b) => daysSince(b.last_contact) - daysSince(a.last_contact))
    .slice(0, 3);

  if (overdue.length) {
    html += '<div class="section"><div class="overdue-banner"><div class="overdue-title">Zu lange nichts gehört</div>';
    overdue.forEach(k => {
      const ds = daysSince(k.last_contact);
      html += `<div class="overdue-person" onclick="openPersonDetail(${k.id})">
        <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
        <div class="overdue-person-name">${esc(k.name)}</div>
        <div class="overdue-person-days">${formatDaysAgo(ds)}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // 14-day timeline
  const today = todayDate();
  let hasAnyDay = false;
  html += '<div class="section">';

  for (let i = 0; i < 14; i++) {
    const d = addDays(today, i);
    const dStr = isoDate(d);
    const items = [];

    anlaesse.forEach(a => {
      let matchDate = a.datum;
      if (a.wiederkehrend || a.typ === 'geburtstag') {
        const orig = parseDate(a.datum);
        matchDate = isoDate(new Date(d.getFullYear(), orig.getMonth(), orig.getDate()));
      }
      if (matchDate === dStr) items.push({ type: 'anlass', anlass: a });
    });

    aktionen.forEach(ak => {
      if (ak.erledigt) return;
      const anlass = anlaesse.find(a => a.id === ak.anlass_id);
      if (!anlass) return;
      let anlassDatum = anlass.datum;
      if (anlass.wiederkehrend || anlass.typ === 'geburtstag') {
        const orig = parseDate(anlass.datum);
        const thisYear = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
        if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
        anlassDatum = isoDate(thisYear);
      }
      const dueDate = addDays(parseDate(anlassDatum), -(ak.vorlauf_tage || 0));
      if (isoDate(dueDate) === dStr) {
        items.push({ type: 'aktion', aktion: ak, anlass, kontakt: kontakte.find(k => k.id === ak.kontakt_id) });
      }
    });

    kontakte.forEach(k => {
      if (!k.bday) return;
      const b = parseDate(k.bday);
      const bdayThisYear = new Date(d.getFullYear(), b.getMonth(), b.getDate());
      if (isoDate(bdayThisYear) === dStr) {
        const hasAnlass = anlaesse.some(a => a.typ === 'geburtstag' && (() => {
          const orig = parseDate(a.datum);
          return orig.getMonth() === b.getMonth() && orig.getDate() === b.getDate();
        })());
        if (!hasAnlass) items.push({ type: 'birthday', kontakt: k });
      }
      const bdayDate = new Date(d.getFullYear(), b.getMonth(), b.getDate());
      const vorlaufDate = addDays(bdayDate, -settings.bday_vorlauf);
      if (isoDate(vorlaufDate) === dStr && isoDate(bdayDate) !== dStr) {
        if (!anlaesse.some(a => a.typ === 'geburtstag')) {
          items.push({ type: 'bday-vorlauf', kontakt: k, daysUntil: settings.bday_vorlauf });
        }
      }
    });

    if (!items.length) continue;
    hasAnyDay = true;

    const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
    const dayLabel = i === 0 ? 'Heute' : (i === 1 ? 'Morgen' : dayNames[d.getDay()] + ', ' + d.getDate() + '. ' + ['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()]);

    html += `<div class="day-row"><div class="day-header ${i===0?'day-today':''}"><span>${dayLabel}</span></div><div class="cards">`;
    items.forEach(item => {
      if (item.type === 'anlass') {
        const a = item.anlass;
        const people = aktionen.filter(ak => ak.anlass_id === a.id).map(ak => kontakte.find(k => k.id === ak.kontakt_id)).filter(Boolean);
        html += `<div class="card ok" onclick="openAnlassDetail(${a.id})">
          <div class="card-info"><div class="card-name">${esc(a.titel)}</div><div class="card-meta">${people.map(p=>esc(p.name)).join(', ')||a.typ}</div></div>
          <div class="card-right"><div class="card-days ok">${a.typ}</div></div></div>`;
      } else if (item.type === 'aktion') {
        const k = item.kontakt;
        html += `<div class="card soon" onclick="${k?`openPersonDetail(${k.id})`:''}">
          <div class="avatar ${k?avClass(k.level):''}">${k?initials(k.name):'--'}</div>
          <div class="card-info"><div class="card-name">${esc(item.aktion.was)}</div><div class="card-meta">${k?esc(k.name):''} / ${esc(item.anlass.titel)}</div></div>
          <div class="card-right"><div class="card-days soon">Vorlauf</div></div></div>`;
      } else if (item.type === 'birthday') {
        const k = item.kontakt;
        html += `<div class="card ok" onclick="openPersonDetail(${k.id})">
          <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
          <div class="card-info"><div class="card-name">${esc(k.name)}</div><div class="card-meta">Geburtstag</div></div>
          <div class="card-right"><div class="card-days ok">heute</div></div></div>`;
      } else if (item.type === 'bday-vorlauf') {
        const k = item.kontakt;
        html += `<div class="card soon" onclick="openPersonDetail(${k.id})">
          <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
          <div class="card-info"><div class="card-name">${esc(k.name)}</div><div class="card-meta">Geburtstag in ${item.daysUntil} Tagen</div></div>
          <div class="card-right"><div class="card-days soon">Vorlauf</div></div></div>`;
      }
    });
    html += '</div></div>';
  }

  if (!hasAnyDay && !overdue.length) {
    html += '<div class="empty-block">Keine Termine in den nächsten 14 Tagen</div>';
  }
  html += '</div>';

  // ─── "Heute möglich" motivation block ───
  const quickActions = [];

  // People approaching threshold
  const approaching = kontakte
    .filter(k => k.last_contact && urgency(k) === 'soon')
    .sort((a, b) => daysSince(b.last_contact) - daysSince(a.last_contact))
    .slice(0, 3);
  approaching.forEach(k => {
    quickActions.push({ name: k.name, id: k.id, reason: `vor ${daysSince(k.last_contact)} Tagen`, action: 'Kurz melden' });
  });

  // Open aktionen
  const openAktionen = aktionen.filter(ak => !ak.erledigt).slice(0, 2);
  openAktionen.forEach(ak => {
    const k = kontakte.find(x => x.id === ak.kontakt_id);
    const a = anlaesse.find(x => x.id === ak.anlass_id);
    if (k && a) {
      quickActions.push({ name: k.name, id: k.id, reason: esc(a.titel), action: esc(ak.was) });
    }
  });

  if (quickActions.length) {
    html += '<div class="section"><div class="motivation-block"><div class="motivation-label">Heute möglich — nur 2 Minuten</div>';
    quickActions.slice(0, 4).forEach(q => {
      html += `<div class="mini-action" onclick="openPersonDetail(${q.id})">
        <div class="mini-action-text">${esc(q.name)}<div class="mini-action-sub">${q.reason}</div></div>
        <div class="mini-action-arrow">${q.action} ${chevron}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // Upcoming anlaesse preview
  const upcoming = getUpcomingAnlaesse(30).slice(0, 3);
  if (upcoming.length) {
    html += '<div class="section"><div class="motivation-block"><div class="motivation-label">Steht bald an</div>';
    upcoming.forEach(u => {
      const daysLeft = daysBetween(todayDate(), u._effectiveDate);
      html += `<div class="mini-action" onclick="${u.id ? `openAnlassDetail(${u.id})` : ''}">
        <div class="mini-action-text">${esc(u.titel)}<div class="mini-action-sub">in ${daysLeft} Tagen</div></div>
        <div class="mini-action-arrow">${chevron}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  container.innerHTML = html;
}

// ─── PERSONEN ───
function renderPersonen(container) {
  let html = '';

  // Search
  html += `<div class="search-bar">
    <input class="search-input" id="personSearchInput" placeholder="Suchen..." value="${esc(personSearch)}" oninput="onPersonSearch(this.value)">
  </div>`;

  // Filter (zurückhaltend)
  html += `<div class="filter-row">
    <button class="filter-btn ${personFilter==='all'?'active':''}" onclick="setPersonFilter('all')">Alle</button>
    <button class="filter-btn ${personFilter==='inner'?'active':''}" onclick="setPersonFilter('inner')">inner</button>
    <button class="filter-btn ${personFilter==='close'?'active':''}" onclick="setPersonFilter('close')">eng</button>
    <button class="filter-btn ${personFilter==='mid'?'active':''}" onclick="setPersonFilter('mid')">mittel</button>
    <button class="filter-btn ${personFilter==='loose'?'active':''}" onclick="setPersonFilter('loose')">locker</button>
  </div>`;

  // Build filtered list
  let list = kontakte.slice();
  if (personFilter !== 'all') list = list.filter(k => k.level === personFilter);
  if (personSearch) {
    const q = personSearch.toLowerCase();
    list = list.filter(k => k.name.toLowerCase().includes(q));
  }

  // If searching or filtering, show flat list
  if (personSearch || personFilter !== 'all') {
    list.sort((a, b) => daysSince(b.last_contact) - daysSince(a.last_contact));
    html += '<div class="section"><div class="section-label">' + list.length + ' Personen</div>';
    if (!list.length) {
      html += '<div class="empty-block">Keine Personen gefunden</div>';
    } else {
      html += '<div class="cards">';
      list.forEach(k => html += renderPersonCard(k));
      html += '</div>';
    }
    html += '</div>';
  } else {
    // Structured view: relevant first, then grouped

    // "Gerade relevant" section: soon + urgent, max 5
    const relevant = kontakte
      .filter(k => k.last_contact && (urgency(k) === 'urgent' || urgency(k) === 'soon'))
      .sort((a, b) => {
        const urgOrder = { urgent: 0, soon: 1 };
        const diff = (urgOrder[urgency(a)] || 2) - (urgOrder[urgency(b)] || 2);
        return diff || daysSince(b.last_contact) - daysSince(a.last_contact);
      })
      .slice(0, 5);

    if (relevant.length) {
      html += '<div class="section"><div class="section-label">Gerade relevant</div>';
      relevant.forEach(k => {
        const ds = daysSince(k.last_contact);
        const urg = urgency(k);
        const reason = urg === 'urgent'
          ? `Vor ${ds} Tagen — solltest dich melden`
          : `Vor ${ds} Tagen — bald fällig`;
        html += `<div class="relevance-card" onclick="openPersonDetail(${k.id})">
          <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
          <div class="card-info">
            <div class="card-name">${esc(k.name)}</div>
            <div class="relevance-reason">${reason}</div>
          </div>
          <div class="card-right"><div class="card-days ${urgClass(urg)}">${formatDaysAgo(ds)}</div></div>
        </div>`;
      });
      html += '</div>';
    }

    // Grouped by level
    const levelOrder = ['inner', 'close', 'mid', 'loose'];
    const levelNames = { inner: 'Inner Circle', close: 'Eng', mid: 'Mittel', loose: 'Locker' };

    levelOrder.forEach(level => {
      const group = kontakte.filter(k => k.level === level)
        .sort((a, b) => a.name.localeCompare(b.name, 'de'));
      if (!group.length) return;

      html += `<div class="section"><div class="group-header">${levelNames[level]} · ${group.length}</div><div class="cards">`;
      group.forEach(k => html += renderPersonCard(k));
      html += '</div></div>';
    });
  }

  container.innerHTML = html;
  const si = document.getElementById('personSearchInput');
  if (si && personSearch) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
}

function renderPersonCard(k) {
  const urg = urgency(k);
  const ds = daysSince(k.last_contact);
  const nextAnlass = findNextAnlassForPerson(k.id);
  const meta = nextAnlass || levelLabel(k.level);
  return `<div class="card ${urgClass(urg)}" onclick="openPersonDetail(${k.id})">
    <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
    <div class="card-info">
      <div class="card-name">${esc(k.name)}</div>
      <div class="card-meta">${esc(meta)}</div>
    </div>
    <div class="card-right"><div class="card-days ${urgClass(urg)}">${formatDaysAgo(ds)}</div></div>
  </div>`;
}

function findNextAnlassForPerson(kontaktId) {
  const personAktionen = aktionen.filter(a => a.kontakt_id === kontaktId);
  if (!personAktionen.length) return null;
  const today = todayDate();
  let closest = null;
  let closestDays = Infinity;
  personAktionen.forEach(ak => {
    const anlass = anlaesse.find(a => a.id === ak.anlass_id);
    if (!anlass) return;
    let datum = anlass.datum;
    if (anlass.wiederkehrend || anlass.typ === 'geburtstag') {
      const orig = parseDate(datum);
      const thisYear = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
      if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
      datum = isoDate(thisYear);
    }
    const days = daysBetween(today, parseDate(datum));
    if (days >= 0 && days < closestDays) {
      closestDays = days;
      closest = anlass.titel + ' in ' + days + 'T';
    }
  });
  return closest;
}

function onPersonSearch(val) { personSearch = val; renderPersonen(document.getElementById('appBody')); }
function setPersonFilter(f) { personFilter = f; render(); }

// ─── ANLAESSE ───
function getUpcomingAnlaesse(dayRange) {
  const today = todayDate();
  const end = addDays(today, dayRange);
  const upcoming = [];

  anlaesse.forEach(a => {
    let datum;
    if (a.wiederkehrend || a.typ === 'geburtstag') {
      const orig = parseDate(a.datum);
      datum = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
      if (datum < today) datum = new Date(today.getFullYear() + 1, orig.getMonth(), orig.getDate());
    } else {
      datum = parseDate(a.datum);
    }
    if (datum >= today && datum <= end) {
      upcoming.push({ ...a, _effectiveDate: datum, _effectiveDateStr: isoDate(datum) });
    }
  });

  // Auto-birthdays
  kontakte.forEach(k => {
    if (!k.bday) return;
    const b = parseDate(k.bday);
    let bdayDate = new Date(today.getFullYear(), b.getMonth(), b.getDate());
    if (bdayDate < today) bdayDate = new Date(today.getFullYear() + 1, b.getMonth(), b.getDate());
    if (bdayDate > end) return;
    const covered = upcoming.some(u => u.typ === 'geburtstag' && u._effectiveDate.getTime() === bdayDate.getTime());
    if (!covered) {
      upcoming.push({
        id: null, titel: 'Geburtstag ' + k.name, typ: 'geburtstag',
        wiederkehrend: true, _effectiveDate: bdayDate,
        _effectiveDateStr: isoDate(bdayDate), _autoKontakt: k
      });
    }
  });

  upcoming.sort((a, b) => a._effectiveDate - b._effectiveDate);
  return upcoming;
}

function renderAnlaesse(container) {
  const upcoming = getUpcomingAnlaesse(90);
  let html = '<div class="section">';

  if (!upcoming.length) {
    html += '<div class="section-label">Nächste 90 Tage</div>';
    html += '<div class="empty-block">Keine Anlässe geplant</div>';
  } else {
    let currentMonth = '';
    upcoming.forEach(a => {
      const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
      const m = monthNames[a._effectiveDate.getMonth()] + ' ' + a._effectiveDate.getFullYear();
      if (m !== currentMonth) {
        if (currentMonth) html += '</div>';
        currentMonth = m;
        html += `<div class="anlass-month">${m}</div><div class="cards">`;
      }
      const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
      const relAktionen = a.id ? aktionen.filter(ak => ak.anlass_id === a.id) : [];
      const openCount = relAktionen.filter(ak => !ak.erledigt).length;
      const people = relAktionen.map(ak => kontakte.find(k => k.id === ak.kontakt_id)).filter(Boolean);
      const peopleNames = a._autoKontakt ? esc(a._autoKontakt.name) : people.map(p => esc(p.name)).join(', ');

      html += `<div class="anlass-card" onclick="${a.id ? `openAnlassDetail(${a.id})` : ''}">
        <div class="anlass-date-col">
          <div class="anlass-day">${a._effectiveDate.getDate()}</div>
          <div class="anlass-weekday">${dayNames[a._effectiveDate.getDay()]}</div>
        </div>
        <div class="anlass-info">
          <div class="anlass-title">${esc(a.titel)}</div>
          ${peopleNames ? `<div class="anlass-people">${peopleNames}</div>` : ''}
          ${openCount > 0 ? `<div class="anlass-actions-count">${openCount} offen</div>` : ''}
        </div>
        <div class="anlass-typ">${a.typ || ''}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

// ─── PERSON DETAIL ───
function openPersonDetail(id) {
  const k = kontakte.find(x => x.id === id);
  if (!k) return;
  const urg = urgency(k);
  const ds = daysSince(k.last_contact);
  const t = threshold(k.level);
  const urgColor = urg === 'urgent' ? 'var(--red)' : urg === 'soon' ? 'var(--amber)' : urg === 'neutral' ? 'var(--text3)' : 'var(--green)';
  const bday = daysUntilBday(k.bday);

  const personAktionen = aktionen.filter(a => a.kontakt_id === id);
  const personAnlassIds = [...new Set(personAktionen.map(a => a.anlass_id))];
  const personAnlaesse = personAnlassIds.map(aid => anlaesse.find(a => a.id === aid)).filter(Boolean);

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayDetail')">${backSvg} Zurück</button>
    <div class="detail-hero">
      <div class="detail-avatar ${avClass(k.level)}">${initials(k.name)}</div>
      <div>
        <div class="detail-name">${esc(k.name)}</div>
        <div class="detail-level">${levelLabel(k.level)}</div>
      </div>
    </div>

    <div class="info-list">
      <div class="info-row"><span class="info-key">Letzter Kontakt</span><span class="info-val">${k.last_contact ? formatDateShort(k.last_contact) : '--'}</span></div>
      <div class="info-row"><span class="info-key">Vor</span><span class="info-val" style="color:${urgColor}">${formatDaysAgo(ds)}</span></div>
      <div class="info-row"><span class="info-key">Ziel</span><span class="info-val">alle ${t} Tage</span></div>
      <div class="info-row"><span class="info-key">Geburtstag</span><span class="info-val">${k.bday ? formatDateShort(k.bday) + (bday !== null ? ' (in ' + bday + 'T)' : '') : '--'}</span></div>
      ${k.note ? `<div class="info-row"><span class="info-key">Notiz</span><span class="info-val" style="font-family:var(--sans);font-size:13px">${esc(k.note)}</span></div>` : ''}
    </div>

    <div class="action-list">
      <button class="action-btn" onclick="markContacted(${k.id})"><span>Heute gemeldet</span><span class="action-arrow">${chevron}</span></button>
      <button class="action-btn" onclick="markDranGedacht(${k.id})"><span>Dran gedacht</span><span class="action-arrow">${chevron}</span></button>
      <button class="action-btn" onclick="openNoteForm(${k.id})"><span>Notiz bearbeiten</span><span class="action-arrow">${chevron}</span></button>
      <button class="action-btn" onclick="closeOverlay('overlayDetail');openPersonForm(${k.id})"><span>Bearbeiten</span><span class="action-arrow">${chevron}</span></button>
    </div>`;

  if (personAnlaesse.length) {
    html += '<div class="section-label" style="margin-top:8px">Anlässe</div><div class="cards">';
    personAnlaesse.forEach(a => {
      html += `<div class="card ok" onclick="closeOverlay('overlayDetail');openAnlassDetail(${a.id})">
        <div class="card-info"><div class="card-name">${esc(a.titel)}</div><div class="card-meta">${formatDateShort(a.datum)} / ${a.typ}</div></div>
        <div class="card-right"><div class="card-days ok">${a.wiederkehrend ? 'jährlich' : 'einmalig'}</div></div>
      </div>`;
    });
    html += '</div>';
  }

  const openAk = personAktionen.filter(a => !a.erledigt);
  if (openAk.length) {
    html += '<div class="section-label" style="margin-top:8px">Offene Aufgaben</div><div class="cards">';
    openAk.forEach(ak => {
      const anlass = anlaesse.find(a => a.id === ak.anlass_id);
      html += `<div class="check-row" onclick="toggleAktion(${ak.id}, ${k.id})">
        <div class="check-box"></div>
        <div class="check-text">${esc(ak.was)}</div>
        <div class="check-meta">${anlass ? esc(anlass.titel) : ''}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<button class="btn-danger" onclick="deletePerson(${k.id})">Person löschen</button></div>`;

  const overlay = document.getElementById('overlayDetail');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

async function markContacted(id) {
  const rows = await api(`kontakte?id=eq.${id}`, { method: 'PATCH', body: { last_contact: todayISO() } });
  if (rows && rows[0]) { const idx = kontakte.findIndex(k => k.id === id); if (idx >= 0) kontakte[idx] = rows[0]; }
  closeOverlay('overlayDetail');
  showToast('Gemeldet');
  render();
}

async function markDranGedacht(id) {
  const rows = await api(`kontakte?id=eq.${id}`, { method: 'PATCH', body: { last_contact: todayISO() } });
  if (rows && rows[0]) { const idx = kontakte.findIndex(k => k.id === id); if (idx >= 0) kontakte[idx] = rows[0]; }
  closeOverlay('overlayDetail');
  showToast('Dran gedacht');
  render();
}

async function deletePerson(id) {
  if (!confirm('Person wirklich löschen?')) return;
  await api(`aktionen?kontakt_id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  await api(`kontakte?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  aktionen = aktionen.filter(a => a.kontakt_id !== id);
  kontakte = kontakte.filter(k => k.id !== id);
  closeOverlay('overlayDetail');
  render();
}

async function toggleAktion(aktionId, personId) {
  const ak = aktionen.find(a => a.id === aktionId);
  if (!ak) return;
  const rows = await api(`aktionen?id=eq.${aktionId}`, { method: 'PATCH', body: { erledigt: !ak.erledigt } });
  if (rows && rows[0]) { const idx = aktionen.findIndex(a => a.id === aktionId); if (idx >= 0) aktionen[idx] = rows[0]; }
  openPersonDetail(personId);
  render();
}

// ─── PERSON FORM ───
function openPersonForm(id) {
  const k = id ? kontakte.find(x => x.id === id) : null;
  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayForm')">${backSvg} Zurück</button>
    <div class="form-title">${k ? 'Bearbeiten' : 'Person eintragen'}</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="pf-name" value="${k ? esc(k.name) : ''}" placeholder="Name" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Nähe</label>
      <div class="level-select">
        <button class="level-opt ${k && k.level==='inner' ? 'sel-inner' : ''}" onclick="pfSetLevel('inner')" id="pf-lv-inner">inner</button>
        <button class="level-opt ${(!k || k.level==='close') ? 'sel-close' : ''}" onclick="pfSetLevel('close')" id="pf-lv-close">eng</button>
        <button class="level-opt ${k && k.level==='mid' ? 'sel-mid' : ''}" onclick="pfSetLevel('mid')" id="pf-lv-mid">mittel</button>
        <button class="level-opt ${k && k.level==='loose' ? 'sel-loose' : ''}" onclick="pfSetLevel('loose')" id="pf-lv-loose">locker</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Geburtstag (optional)</label>
      <input class="form-input" id="pf-bday" type="date" value="${k && k.bday ? k.bday : ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Letzter Kontakt</label>
      <input class="form-input" id="pf-last" type="date" value="${k && k.last_contact ? k.last_contact : todayISO()}">
    </div>
    <div class="form-group">
      <label class="form-label">Notiz (optional)</label>
      <textarea class="form-input" id="pf-note" placeholder="z.B. ruft lieber an">${k && k.note ? esc(k.note) : ''}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeOverlay('overlayForm')">Abbrechen</button>
      <button class="btn-primary" onclick="savePerson(${id || 'null'})">Speichern</button>
    </div>
  </div>`;

  const overlay = document.getElementById('overlayForm');
  overlay.innerHTML = html;
  overlay.classList.add('open');
  overlay.dataset.level = k ? k.level : 'close';
}

function pfSetLevel(l) {
  document.getElementById('overlayForm').dataset.level = l;
  ['inner','close','mid','loose'].forEach(x => {
    document.getElementById('pf-lv-' + x).className = 'level-opt' + (x === l ? ' sel-' + x : '');
  });
}

async function savePerson(id) {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) return;
  const level = document.getElementById('overlayForm').dataset.level || 'close';
  const bday = document.getElementById('pf-bday').value || null;
  const last_contact = document.getElementById('pf-last').value || null;
  const note = document.getElementById('pf-note').value.trim() || null;
  const body = { name, level, bday, last_contact, note };

  if (id) {
    const rows = await api(`kontakte?id=eq.${id}`, { method: 'PATCH', body });
    if (rows && rows[0]) { const idx = kontakte.findIndex(k => k.id === id); if (idx >= 0) kontakte[idx] = rows[0]; }
  } else {
    const rows = await api('kontakte', { method: 'POST', body });
    if (rows && rows[0]) kontakte.unshift(rows[0]);
  }
  closeOverlay('overlayForm');
  showToast(id ? 'Gespeichert' : 'Eingetragen');
  render();
}

// ─── NOTE FORM ───
function openNoteForm(personId) {
  const k = kontakte.find(x => x.id === personId);
  if (!k) return;
  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayNoteForm')">${backSvg} Zurück</button>
    <div class="form-title">Notiz</div>
    <div class="form-group">
      <label class="form-label">${esc(k.name)}</label>
      <textarea class="form-input" id="nf-note" rows="6" placeholder="Notiz...">${k.note ? esc(k.note) : ''}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeOverlay('overlayNoteForm')">Abbrechen</button>
      <button class="btn-primary" onclick="saveNote(${personId})">Speichern</button>
    </div>
  </div>`;
  const overlay = document.getElementById('overlayNoteForm');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

async function saveNote(personId) {
  const note = document.getElementById('nf-note').value.trim() || null;
  const rows = await api(`kontakte?id=eq.${personId}`, { method: 'PATCH', body: { note } });
  if (rows && rows[0]) { const idx = kontakte.findIndex(k => k.id === personId); if (idx >= 0) kontakte[idx] = rows[0]; }
  closeOverlay('overlayNoteForm');
  closeOverlay('overlayDetail');
  showToast('Gespeichert');
  render();
}

// ─── ANLASS DETAIL ───
function openAnlassDetail(id) {
  const a = anlaesse.find(x => x.id === id);
  if (!a) return;
  const relAktionen = aktionen.filter(ak => ak.anlass_id === id);
  const today = todayDate();
  let effectiveDate = a.datum;
  if (a.wiederkehrend || a.typ === 'geburtstag') {
    const orig = parseDate(a.datum);
    const thisYear = new Date(today.getFullYear(), orig.getMonth(), orig.getDate());
    if (thisYear < today) thisYear.setFullYear(today.getFullYear() + 1);
    effectiveDate = isoDate(thisYear);
  }

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayAnlassDetail')">${backSvg} Zurück</button>
    <div class="form-title">${esc(a.titel)}</div>
    <div class="info-list">
      <div class="info-row"><span class="info-key">Datum</span><span class="info-val">${formatDateGerman(effectiveDate)}</span></div>
      <div class="info-row"><span class="info-key">Typ</span><span class="info-val">${a.typ}</span></div>
      <div class="info-row"><span class="info-key">Wiederkehrend</span><span class="info-val">${a.wiederkehrend ? 'ja' : 'nein'}</span></div>
    </div>`;

  if (relAktionen.length) {
    html += '<div class="section-label">Aufgaben</div><div class="cards">';
    relAktionen.forEach(ak => {
      const k = kontakte.find(x => x.id === ak.kontakt_id);
      const checkedClass = ak.erledigt ? 'checked' : '';
      html += `<div class="check-row" onclick="toggleAktionAnlass(${ak.id}, ${a.id})">
        <div class="check-box ${checkedClass}">${ak.erledigt ? checkSvg : ''}</div>
        <div class="check-text ${checkedClass}">${esc(ak.was)}</div>
        <div class="check-meta">${k ? esc(k.name) : ''} / ${ak.vorlauf_tage || 0}T Vorlauf</div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<div style="margin-top:16px">
    <button class="btn-primary" onclick="openAktionForm(${a.id})" style="width:100%">Aufgabe hinzufügen</button>
  </div>
  <div style="margin-top:8px;display:flex;gap:8px">
    <button class="btn-secondary" style="flex:1" onclick="closeOverlay('overlayAnlassDetail');openAnlassForm(${a.id})">Bearbeiten</button>
    <button class="btn-secondary" style="flex:1;color:var(--red);border-color:#3a2020" onclick="deleteAnlass(${a.id})">Löschen</button>
  </div></div>`;

  const overlay = document.getElementById('overlayAnlassDetail');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

async function toggleAktionAnlass(aktionId, anlassId) {
  const ak = aktionen.find(a => a.id === aktionId);
  if (!ak) return;
  const rows = await api(`aktionen?id=eq.${aktionId}`, { method: 'PATCH', body: { erledigt: !ak.erledigt } });
  if (rows && rows[0]) { const idx = aktionen.findIndex(a => a.id === aktionId); if (idx >= 0) aktionen[idx] = rows[0]; }
  openAnlassDetail(anlassId);
}

async function deleteAnlass(id) {
  if (!confirm('Anlass wirklich löschen?')) return;
  await api(`aktionen?anlass_id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  await api(`anlaesse?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  aktionen = aktionen.filter(a => a.anlass_id !== id);
  anlaesse = anlaesse.filter(a => a.id !== id);
  closeOverlay('overlayAnlassDetail');
  render();
}

// ─── ANLASS FORM — Step Flow ───
let anlassStep = 1;
let anlassData = {};

function openAnlassForm(id) {
  const a = id ? anlaesse.find(x => x.id === id) : null;

  if (a) {
    // Edit mode: single form, no steps
    openAnlassEditForm(a);
    return;
  }

  // New: step flow
  anlassStep = 1;
  anlassData = { titel: '', datum: '', typ: 'feiertag', wiederkehrend: true, people: [], was: '', vorlauf: 3 };
  renderAnlassStep();
}

function renderAnlassStep() {
  const overlay = document.getElementById('overlayAnlassForm');
  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="${anlassStep === 1 ? "closeOverlay('overlayAnlassForm')" : 'anlassPrev()'}">${backSvg} ${anlassStep === 1 ? 'Abbrechen' : 'Zurück'}</button>
    <div class="step-indicator">
      <div class="step-dot ${anlassStep >= 1 ? (anlassStep > 1 ? 'done' : 'active') : ''}"></div>
      <div class="step-dot ${anlassStep >= 2 ? (anlassStep > 2 ? 'done' : 'active') : ''}"></div>
      <div class="step-dot ${anlassStep >= 3 ? (anlassStep > 3 ? 'done' : 'active') : ''}"></div>
      <div class="step-dot ${anlassStep >= 4 ? 'active' : ''}"></div>
    </div>
    <div class="step-content">`;

  if (anlassStep === 1) {
    html += `<div class="step-q">Was ist der Anlass?</div>
      <div class="form-group">
        <input class="form-input" id="as-titel" value="${esc(anlassData.titel)}" placeholder="z.B. Weihnachten, Umzug Lisa" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Datum</label>
        <input class="form-input" id="as-datum" type="date" value="${anlassData.datum}">
      </div>
      <div class="form-group">
        <label class="form-label">Art</label>
        <select class="form-input" id="as-typ">
          <option value="feiertag" ${anlassData.typ==='feiertag'?'selected':''}>Feiertag</option>
          <option value="geburtstag" ${anlassData.typ==='geburtstag'?'selected':''}>Geburtstag</option>
          <option value="einmalig" ${anlassData.typ==='einmalig'?'selected':''}>Einmalig</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Wiederkehrend?</label>
        <div class="level-select">
          <button class="level-opt ${anlassData.wiederkehrend ? 'sel-mid' : ''}" onclick="anlassData.wiederkehrend=true;renderAnlassStep()">ja</button>
          <button class="level-opt ${!anlassData.wiederkehrend ? 'sel-close' : ''}" onclick="anlassData.wiederkehrend=false;renderAnlassStep()">nein</button>
        </div>
      </div>`;
  } else if (anlassStep === 2) {
    html += `<div class="step-q">Für wen ist der Anlass?</div>
      <div class="search-bar" style="padding:0 0 12px">
        <input class="search-input" id="as-people-search" placeholder="Suchen..." oninput="filterAnlassPeople(this.value)">
      </div>
      <div id="as-people-list">`;
    html += renderAnlassPeopleList('');
    html += '</div>';
  } else if (anlassStep === 3) {
    html += `<div class="step-q">Was soll passieren?</div>
      <div class="form-group">
        <input class="form-input" id="as-was" value="${esc(anlassData.was)}" placeholder="z.B. Karte schicken, Geschenk besorgen" autocomplete="off">
      </div>`;
  } else if (anlassStep === 4) {
    html += `<div class="step-q">Wann willst du erinnert werden?</div>
      <div class="form-group">
        <label class="form-label">Vorlauf in Tagen</label>
        <input class="form-input" id="as-vorlauf" type="number" value="${anlassData.vorlauf}" min="0" style="width:100px">
      </div>
      <div style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.5">
        Die Aufgabe erscheint ${anlassData.vorlauf} Tage vor dem Anlass auf deinem Heute-Screen.
      </div>
      <div style="margin-top:16px;padding:12px;background:var(--surface);border-radius:var(--radius);font-size:13px;color:var(--text2);line-height:1.5">
        <strong style="color:var(--text)">${esc(anlassData.titel)}</strong><br>
        ${anlassData.datum ? formatDateGerman(anlassData.datum) : '--'} / ${anlassData.wiederkehrend ? 'jährlich' : 'einmalig'}<br>
        ${anlassData.people.length} Person${anlassData.people.length !== 1 ? 'en' : ''}<br>
        ${anlassData.was || 'Keine Aufgabe'}
      </div>`;
  }

  html += '</div>';

  // Navigation
  if (anlassStep < 4) {
    html += `<div class="form-actions"><button class="btn-primary" onclick="anlassNext()">Weiter</button></div>`;
  } else {
    html += `<div class="form-actions"><button class="btn-primary" onclick="saveAnlassFlow()">Anlegen</button></div>`;
  }

  html += '</div>';
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

function renderAnlassPeopleList(query) {
  let list = kontakte.slice().sort((a, b) => a.name.localeCompare(b.name, 'de'));
  if (query) list = list.filter(k => k.name.toLowerCase().includes(query.toLowerCase()));
  let html = '';
  list.forEach(k => {
    const sel = anlassData.people.includes(k.id);
    html += `<div class="picker-person ${sel ? 'selected' : ''}" onclick="toggleAnlassPerson(${k.id})">
      <div class="picker-check ${sel ? 'on' : ''}">${sel ? checkSvg : ''}</div>
      <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
      <div class="card-info"><div class="card-name">${esc(k.name)}</div><div class="card-meta">${levelLabel(k.level)}</div></div>
    </div>`;
  });
  return html;
}

function filterAnlassPeople(q) {
  document.getElementById('as-people-list').innerHTML = renderAnlassPeopleList(q);
}

function toggleAnlassPerson(id) {
  const idx = anlassData.people.indexOf(id);
  if (idx >= 0) anlassData.people.splice(idx, 1);
  else anlassData.people.push(id);
  const searchEl = document.getElementById('as-people-search');
  const q = searchEl ? searchEl.value : '';
  document.getElementById('as-people-list').innerHTML = renderAnlassPeopleList(q);
}

function anlassNext() {
  if (anlassStep === 1) {
    const titel = document.getElementById('as-titel').value.trim();
    const datum = document.getElementById('as-datum').value;
    const typ = document.getElementById('as-typ').value;
    if (!titel || !datum) return;
    anlassData.titel = titel;
    anlassData.datum = datum;
    anlassData.typ = typ;
  } else if (anlassStep === 3) {
    anlassData.was = document.getElementById('as-was').value.trim();
  }
  anlassStep++;
  renderAnlassStep();
}

function anlassPrev() {
  if (anlassStep > 1) { anlassStep--; renderAnlassStep(); }
}

async function saveAnlassFlow() {
  const vorlauf = parseInt(document.getElementById('as-vorlauf').value) || 0;
  anlassData.vorlauf = vorlauf;

  const body = {
    titel: anlassData.titel,
    datum: anlassData.datum,
    typ: anlassData.typ,
    wiederkehrend: anlassData.wiederkehrend
  };

  const rows = await api('anlaesse', { method: 'POST', body });
  if (rows && rows[0]) {
    anlaesse.push(rows[0]);
    const newId = rows[0].id;

    for (const kid of anlassData.people) {
      const akBody = {
        anlass_id: newId, kontakt_id: kid,
        was: anlassData.was || anlassData.titel,
        vorlauf_tage: vorlauf, erledigt: false
      };
      const akRows = await api('aktionen', { method: 'POST', body: akBody });
      if (akRows && akRows[0]) aktionen.push(akRows[0]);
    }
  }

  closeOverlay('overlayAnlassForm');
  showToast('Anlass angelegt');
  render();
}

async function saveAnlassEdit(id) {
  const titel = document.getElementById('ae-titel').value.trim();
  const datum = document.getElementById('ae-datum').value;
  if (!titel || !datum) return;
  const typ = document.getElementById('ae-typ').value;
  const wiederkehrend = document.getElementById('overlayAnlassForm').dataset.wdk === 'true';

  const rows = await api(`anlaesse?id=eq.${id}`, { method: 'PATCH', body: { titel, datum, typ, wiederkehrend } });
  if (rows && rows[0]) { const idx = anlaesse.findIndex(a => a.id === id); if (idx >= 0) anlaesse[idx] = rows[0]; }
  closeOverlay('overlayAnlassForm');
  showToast('Gespeichert');
  render();
}

async function saveAktion(anlassId) {
  const kontakt_id = parseInt(document.getElementById('akf-person').value);
  const was = document.getElementById('akf-was').value.trim();
  if (!was) return;
  const vorlauf_tage = parseInt(document.getElementById('akf-vorlauf').value) || 0;
  const body = { anlass_id: anlassId, kontakt_id, was, vorlauf_tage, erledigt: false };
  const rows = await api('aktionen', { method: 'POST', body });
  if (rows && rows[0]) aktionen.push(rows[0]);
  closeOverlay('overlayAktionForm');
  openAnlassDetail(anlassId);
}

// ─── PERSON PICKER (redesigned — suggestion-first) ───
let pickerMode = '';

function openPersonPicker(mode) {
  pickerMode = mode;
  const title = mode === 'gemeldet' ? 'Heute gemeldet' : 'An wen hast du gedacht?';

  // Suggestions: recently relevant, approaching threshold, or overdue
  const suggestions = kontakte
    .filter(k => k.last_contact)
    .sort((a, b) => {
      const urgOrder = { urgent: 0, soon: 1, ok: 2, neutral: 3 };
      const diff = (urgOrder[urgency(a)] || 3) - (urgOrder[urgency(b)] || 3);
      return diff || daysSince(b.last_contact) - daysSince(a.last_contact);
    })
    .slice(0, 5);

  let html = `<div class="overlay-inner">
    <button class="back-btn" onclick="closeOverlay('overlayQuick')">${backSvg} Zurück</button>
    <div class="form-title">${title}</div>`;

  if (suggestions.length) {
    html += '<div class="section-label">Passt gerade</div><div class="cards">';
    suggestions.forEach(k => {
      const ds = daysSince(k.last_contact);
      const urg = urgency(k);
      html += `<div class="card ${urgClass(urg)}" onclick="doPickerAction(${k.id})">
        <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
        <div class="card-info"><div class="card-name">${esc(k.name)}</div><div class="card-meta">${levelLabel(k.level)}</div></div>
        <div class="card-right"><div class="card-days ${urgClass(urg)}">${formatDaysAgo(ds)}</div></div>
      </div>`;
    });
    html += '</div>';
  }

  // Search
  html += `<div style="margin-top:16px">
    <input class="search-input" id="pickerSearch" placeholder="Suchen..." oninput="filterPickerList(this.value)">
  </div>`;

  // Expandable full list
  html += `<button class="expand-toggle" onclick="toggleExpand('pickerExpand', this)" style="margin-top:12px">
    <span>Alle Kontakte</span><span style="font-family:var(--mono);font-size:12px">${kontakte.length}</span>
  </button>`;
  html += '<div class="expand-body" id="pickerExpand"><div class="cards" id="pickerAllList">';
  kontakte.slice().sort((a, b) => a.name.localeCompare(b.name, 'de')).forEach(k => {
    const ds = daysSince(k.last_contact);
    const urg = urgency(k);
    html += `<div class="card ${urgClass(urg)}" onclick="doPickerAction(${k.id})">
      <div class="avatar ${avClass(k.level)}">${initials(k.name)}</div>
      <div class="card-info"><div class="card-name">${esc(k.name)}</div></div>
      <div class="card-right"><div class="card-days ${urgClass(urg)}">${formatDaysAgo(ds)}</div></div>
    </div>`;
  });
  html += '</div></div></div>';

  const overlay = document.getElementById('overlayQuick');
  overlay.innerHTML = html;
  overlay.classList.add('open');
}

function filterPickerList(q) {
  if (!q) return;
  // Open the expand body and filter
  const expand = document.getElementById('pickerExpand');
  expand.classList.add('open');
  const allCards = expand.querySelectorAll('.card');
  allCards.forEach(card => {
    const name = card.querySelector('.card-name').textContent.toLowerCase();
    card.style.display = name.includes(q.toLowerCase()) ? '' : 'none';
  });
}

async function doPickerAction(id) {
  if (pickerMode === 'gemeldet') {
    await markContacted(id);
  } else {
    await markDranGedacht(id);
  }
  closeOverlay('overlayQuick');
}

function toggleExpand(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

// ─── SETTINGS ───
function renderSettings(container) {
  let html = '<div class="section">';

  html += '<div class="section-label">Frequenz — wie oft melden</div>';
  html += '<div class="info-list">';
  html += `<div class="info-row"><span class="info-key">inner</span><span class="info-val" style="display:flex;align-items:center;gap:6px">alle <input type="number" class="settings-num" value="${settings.freq_inner}" min="1" max="365" onchange="updateSetting('freq_inner', this.value)"> Tage</span></div>`;
  html += `<div class="info-row"><span class="info-key">eng</span><span class="info-val" style="display:flex;align-items:center;gap:6px">alle <input type="number" class="settings-num" value="${settings.freq_close}" min="1" max="365" onchange="updateSetting('freq_close', this.value)"> Tage</span></div>`;
  html += `<div class="info-row"><span class="info-key">mittel</span><span class="info-val" style="display:flex;align-items:center;gap:6px">alle <input type="number" class="settings-num" value="${settings.freq_mid}" min="1" max="365" onchange="updateSetting('freq_mid', this.value)"> Tage</span></div>`;
  html += `<div class="info-row"><span class="info-key">locker</span><span class="info-val" style="display:flex;align-items:center;gap:6px">alle <input type="number" class="settings-num" value="${settings.freq_loose}" min="1" max="999" onchange="updateSetting('freq_loose', this.value)"> Tage</span></div>`;
  html += '</div>';

  html += '<div class="section-label">Geburtstag — Standard-Vorlauf</div>';
  html += '<div class="info-list">';
  html += `<div class="info-row"><span class="info-key">Vorlauf</span><span class="info-val" style="display:flex;align-items:center;gap:6px"><input type="number" class="settings-num" value="${settings.bday_vorlauf}" min="0" max="30" onchange="updateSetting('bday_vorlauf', this.value)"> Tage vorher</span></div>`;
  html += '</div>';

  html += `<div style="padding:20px 0;font-size:12px;color:var(--text3);font-family:var(--mono);line-height:1.7;text-align:center">
    Frequenz bestimmt, ab wann eine Person<br>als "zu lange nichts gehört" gilt.<br><br>
    inner = innerer Kreis, engste Menschen<br>
    eng = enge Freunde, Familie<br>
    mittel = gute Bekannte<br>
    locker = lose Kontakte<br><br>
    Einstellungen werden lokal gespeichert.
  </div>`;

  html += `<button class="btn-secondary" style="width:100%;text-align:center" onclick="resetSettings()">Auf Standard zurücksetzen</button>`;
  html += '</div>';
  container.innerHTML = html;
}

function updateSetting(key, value) {
  settings[key] = parseInt(value) || DEFAULT_SETTINGS[key];
  saveSettings();
}

function resetSettings() {
  settings = { ...DEFAULT_SETTINGS };
  saveSettings();
  render();
}

function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function closeSheet() {
  document.getElementById('personSheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('open');
}
