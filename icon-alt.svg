<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="108" fill="#0f0f0f"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Letter D for "Dran" — geometric, DM Mono inspired -->
  <text x="256" y="295" text-anchor="middle" dominant-baseline="central"
        font-family="'DM Mono', 'SF Mono', monospace"
